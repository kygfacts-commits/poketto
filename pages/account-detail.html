<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Detail Akun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poketto">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Main content -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="p-6 md:p-10 max-w-3xl mx-auto">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-6">
        <button type="button" id="back-btn" class="p-2 rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h1 id="page-title" class="text-2xl font-bold text-[#1E1B4B]">Detail Akun</h1>
      </div>

      <!-- Loading state -->
      <div id="loading-state" class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-10 text-center text-gray-400 text-sm">
        Memuat data…
      </div>

      <!-- Account card -->
      <div id="account-card" class="hidden rounded-2xl p-6 mb-6">
        <div class="flex items-center gap-4">
          <div id="account-icon-wrap" class="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0"></div>
          <div>
            <p id="account-name" class="text-lg font-bold text-[#1E1B4B]"></p>
            <p id="account-type-label" class="text-sm text-gray-500"></p>
          </div>
        </div>
        <div class="mt-5">
          <p class="text-xs text-gray-500 mb-1">Saldo Saat Ini</p>
          <p id="account-balance" class="text-3xl font-bold text-[#1E1B4B]"></p>
        </div>
      </div>

      <!-- Not found state -->
      <div id="not-found-state" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-10 text-center text-gray-400 text-sm">
        Akun tidak ditemukan.
      </div>

      <!-- Transaction list -->
      <div id="tx-section" class="hidden">
        <p class="text-sm font-semibold text-gray-500 mb-3">Riwayat Transaksi</p>
        <div id="tx-list" class="space-y-4"></div>
        <div id="tx-empty" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-8 text-center text-gray-400 text-sm">
          Belum ada transaksi untuk akun ini
        </div>
      </div>

      <!-- Holdings (investment accounts only) -->
      <div id="holdings-section" class="hidden mt-6">
        <p class="text-sm font-semibold text-gray-500 mb-3">Holdings Portfolio</p>
        <div id="holdings-list" class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm divide-y divide-gray-50"></div>
        <div id="holdings-empty" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-6 text-center text-sm text-gray-400">
          Belum ada holdings untuk akun ini. <a href="portfolio.html" class="text-lavender hover:underline">Tambah di Portfolio</a>.
        </div>
      </div>

    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { formatCurrency, formatDateWithDay, getAccountBalance, groupTransferPairs } from '../assets/js/utils.js';
    import { fetchCategories, getCategoryColorClasses, TRANSFER_COLOR_CLASSES } from '../assets/js/categories.js';
    import { fetchAllTransactions, fetchProfileCurrency } from '../assets/js/home.js';
    import { fetchAccounts, ACCOUNT_COLOR_CLASSES, getAccountTypeLabel } from '../assets/js/accounts.js';
    import { fetchHoldings } from '../assets/js/portfolio.js';

    document.getElementById('back-btn').addEventListener('click', () => window.history.back());

    const accountId = new URLSearchParams(window.location.search).get('id');

    let currentUser, currency = 'IDR', accounts = [], allTransactions = [], categoriesById = new Map();

    function getAccountById(id) { return accounts.find((a) => a.id === id); }

    function renderTxRow(tx) {
      const isTransfer = tx.type === 'transfer' || !!tx.transfer_type || tx.__isTransfer;
      let iconName, colorClasses, title, subtitleText;
      if (isTransfer) {
        iconName = 'arrow-right-left';
        colorClasses = TRANSFER_COLOR_CLASSES;
        title = 'Transfer';
        const fromName = getAccountById(tx.fromAccountId || tx.account_id)?.name || '?';
        const toName = getAccountById(tx.toAccountId || tx.to_account_id)?.name || '?';
        subtitleText = `${fromName} → ${toName}`;
      } else {
        const cat = categoriesById.get(tx.category_id);
        iconName = cat?.icon || 'circle';
        colorClasses = getCategoryColorClasses(cat?.color || 'slate');
        title = cat?.name || 'Lainnya';
        const acctName = getAccountById(tx.account_id)?.name || '–';
        subtitleText = tx.description ? `${acctName} · ${tx.description}` : acctName;
      }
      let amountClass = 'text-lavender-dark', amountPrefix = '';
      if (!isTransfer && tx.type === 'income') { amountClass = 'text-sky-600'; amountPrefix = '+'; }
      else if (!isTransfer && tx.type === 'expense') { amountClass = 'text-peach'; amountPrefix = '-'; }

      const acc = getAccountById(tx.account_id);
      const amountText = formatCurrency(Number(tx.amount), acc?.currency || currency);
      const desc = `<p class="text-xs text-gray-400 truncate">${subtitleText}</p>`;

      return `<div class="flex items-center gap-3 p-4">
        <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${colorClasses.bg}">
          <i data-lucide="${iconName}" class="w-5 h-5 ${colorClasses.icon}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-medium text-gray-800 truncate">${title}</p>
          ${desc}
        </div>
        <p class="font-semibold ${amountClass} flex-shrink-0">${amountPrefix}${amountText}</p>
      </div>`;
    }

    function render(account) {
      // Hide loading, show content
      document.getElementById('loading-state').classList.add('hidden');

      // Account card
      const cc = ACCOUNT_COLOR_CLASSES[account.color] || ACCOUNT_COLOR_CLASSES.lavender;
      const cardEl = document.getElementById('account-card');
      cardEl.classList.remove('hidden');
      cardEl.className = `rounded-2xl p-6 mb-6 ${cc.bg}`;

      const iconWrap = document.getElementById('account-icon-wrap');
      iconWrap.className = `w-14 h-14 rounded-2xl bg-white/70 flex items-center justify-center flex-shrink-0`;
      iconWrap.innerHTML = `<i data-lucide="${account.icon || 'wallet'}" class="w-7 h-7 ${cc.icon}"></i>`;

      document.getElementById('account-name').textContent = account.name;
      document.getElementById('account-type-label').textContent = getAccountTypeLabel(account.type || 'other');

      const balance = getAccountBalance(account.id, accounts, allTransactions);
      document.getElementById('account-balance').textContent = formatCurrency(balance, account.currency || currency);
      document.getElementById('page-title').textContent = account.name;

      // Transaction list for this account
      const txSection = document.getElementById('tx-section');
      txSection.classList.remove('hidden');

      // Gabungkan pasangan transfer (pakai data penuh agar kedua sisi tersedia),
      // lalu saring yang melibatkan akun ini (asal atau tujuan).
      const accountTxs = groupTransferPairs(allTransactions).filter((tx) => {
        if (tx.__isTransfer) return tx.fromAccountId === account.id || tx.toAccountId === account.id;
        return tx.account_id === account.id || tx.to_account_id === account.id;
      });

      const listEl = document.getElementById('tx-list');
      const emptyEl = document.getElementById('tx-empty');

      if (accountTxs.length === 0) {
        listEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        lucide.createIcons();
        return;
      }
      emptyEl.classList.add('hidden');

      // Group by date (already ordered desc from fetchAllTransactions)
      const groups = [];
      for (const tx of accountTxs) {
        const last = groups[groups.length - 1];
        if (last && last.date === tx.date) last.items.push(tx);
        else groups.push({ date: tx.date, items: [tx] });
      }

      listEl.innerHTML = groups.map((g) => `
        <div>
          <p class="text-sm font-semibold text-gray-400 mb-2">${formatDateWithDay(g.date)}</p>
          <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm divide-y divide-gray-50">
            ${g.items.map((tx) => renderTxRow(tx)).join('')}
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    async function renderHoldings(account) {
      if (account.type !== 'investment') return;
      try {
        const holdings = (await fetchHoldings(currentUser.id)).filter(h => h.account_id === account.id);
        const section = document.getElementById('holdings-section');
        section.classList.remove('hidden');
        const listEl = document.getElementById('holdings-list');
        const emptyEl = document.getElementById('holdings-empty');
        if (holdings.length === 0) {
          emptyEl.classList.remove('hidden');
          lucide.createIcons();
          return;
        }
        emptyEl.classList.add('hidden');
        listEl.innerHTML = holdings.map(h => {
          const val = Number(h.quantity) * Number(h.current_price || h.avg_buy_price);
          const cost = Number(h.quantity) * Number(h.avg_buy_price);
          const gain = val - cost;
          const gainPct = cost > 0 ? (gain / cost * 100).toFixed(1) : '0.0';
          const cur = h.currency || currency;
          const isPos = gain >= 0;
          return `<div class="flex items-center justify-between p-4">
            <div>
              <p class="font-medium text-gray-800">${h.asset_name}</p>
              <p class="text-xs text-gray-400">${Number(h.quantity).toLocaleString('id-ID')} unit · Avg ${formatCurrency(Number(h.avg_buy_price), cur)}</p>
            </div>
            <div class="text-right">
              <p class="font-semibold text-gray-800">${formatCurrency(val, cur)}</p>
              <p class="text-xs ${isPos ? 'text-mint' : 'text-peach'}">${isPos ? '+' : ''}${formatCurrency(gain, cur)} (${isPos ? '+' : ''}${gainPct}%)</p>
            </div>
          </div>`;
        }).join('');
        lucide.createIcons();
      } catch (err) {
        console.error('[holdings]', err.message);
      }
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;

      if (!accountId) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('not-found-state').classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      try { currency = await fetchProfileCurrency(currentUser.id); } catch {}
      try {
        const [inc, exp] = await Promise.all([fetchCategories('income', null, true), fetchCategories('expense', null, true)]);
        categoriesById = new Map([...inc, ...exp].map((c) => [c.id, c]));
      } catch {}
      try {
        [accounts, allTransactions] = await Promise.all([
          fetchAccounts(currentUser.id),
          fetchAllTransactions(currentUser.id),
        ]);
      } catch (err) {
        console.log('[account-detail] Error:', err.message);
      }

      const account = accounts.find((a) => a.id === accountId);
      if (!account) {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('not-found-state').classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      render(account);
      renderHoldings(account);
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
