  <!-- Kalkulator bottom sheet (Fitur 3) -->
  <div id="calc-sheet" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end justify-center z-[60]">

        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="9">9</button>
        <button type="button" class="calc-btn bg-[#EDE9FE] text-[#8B5CF6] rounded-xl py-3 font-semibold" data-val="-">−</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="4">4</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="5">5</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="6">6</button>
        <button type="button" class="calc-btn bg-[#EDE9FE] text-[#8B5CF6] rounded-xl py-3 font-semibold" data-val="+">+</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="1">1</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="2">2</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val="3">3</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B]" data-val=".">.</button>
        <button type="button" class="calc-btn bg-gray-50 rounded-xl py-3 font-semibold text-[#1E1B4B] col-span-2" data-val="0">0</button>
        <button type="button" class="calc-btn calc-eq bg-[#8B5CF6] text-white rounded-xl py-3 font-bold col-span-2" data-act="equals">=</button>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { fetchAccounts } from '../assets/js/accounts.js';
    import { fetchCategories, getCategoryColorClasses, createCategory, CATEGORY_COLORS, ICON_GROUPS } from '../assets/js/categories.js';
    import { fetchSubcategories, createSubcategory } from '../assets/js/subcategories.js';
    import { fetchTransactionById, createTransaction, createTransactions, updateTransaction } from '../assets/js/add.js';
    import { createBill } from '../assets/js/bills.js';
    import { queueToast, showToast } from '../assets/js/toast.js';
    import { formatThousands, parseThousands, attachThousandsInput, validateAmount, shakeElement } from '../assets/js/utils.js';
    import { getSuggestedCategory } from '../assets/js/smart-categorize.js';

    const pageTitle = document.getElementById('page-title');
    const tabButtons = document.querySelectorAll('.tab-btn');

    const formIncomeExpense = document.getElementById('form-income-expense');
    const formTransfer = document.getElementById('form-transfer');

    const ieAccountSelect = document.getElementById('ie-account');
    const ieCategoryGrid = document.getElementById('ie-category-grid');
    const ieAmountInput = document.getElementById('ie-amount');
    const ieDescriptionInput = document.getElementById('ie-description');
    const ieDateInput = document.getElementById('ie-date');
    const ieError = document.getElementById('ie-error');
    const ieSubmitBtn = document.getElementById('ie-submit');

    const trFromAccountSelect = document.getElementById('tr-from-account');
    const trToAccountSelect = document.getElementById('tr-to-account');
    const trAmountInput = document.getElementById('tr-amount');
    const trDescriptionInput = document.getElementById('tr-description');
    const trDateInput = document.getElementById('tr-date');
    const trError = document.getElementById('tr-error');
    const trSubmitBtn = document.getElementById('tr-submit');

    const TAB_BASE_CLASSES = 'tab-btn px-4 py-2 rounded-full font-semibold text-sm transition-colors whitespace-nowrap';
    const TAB_INACTIVE_CLASSES = 'bg-gray-100 text-gray-500 hover:bg-gray-200';
    const TAB_ACTIVE_CLASSES = {
      income: 'bg-[#8B5CF6] text-white',
      expense: 'bg-[#8B5CF6] text-white',
      transfer: 'bg-[#8B5CF6] text-white',
    };

    const CATEGORY_SHORT_NAMES = {
      'Makanan & Minuman': 'Makanan',
      'Tagihan & Utilitas': 'Tagihan',
      'Cicilan/Hutang': 'Cicilan',
      'Freelance/Side Income': 'Freelance',
      'Hasil Investasi': 'Investasi',
      'Hadiah & Donasi': 'Hadiah',
    };

    let currentUser = null;
    let currentTab = 'income';
    let accounts = [];
    let categoriesByType = { income: [], expense: [] };
    let selectedCategoryId = null;
    let editingId = null;
    let selectedSubcategoryId = null;
    let subcategoriesByCategory = new Map(); // category_id -> [subcategory]
    let currentTags = [];

    attachThousandsInput(ieAmountInput);
    attachThousandsInput(trAmountInput);

    // ---------- Transaksi Berulang toggle (Fitur 1) ----------
    const recurringToggle = document.getElementById('ie-recurring-toggle');
    recurringToggle.addEventListener('change', () => {
      document.getElementById('ie-recurring-options').classList.toggle('hidden', !recurringToggle.checked);
    });

    // ---------- Kalkulator (Fitur 3) ----------
    const calcSheet = document.getElementById('calc-sheet');
    const calcDisplay = document.getElementById('calc-display');
    let calcExpr = '';
    let calcTargetId = 'ie-amount';

    function calcRender() {
      calcDisplay.textContent = calcExpr || '0';
    }

    function calcEvaluate(s) {
      const expr = String(s).replace(/×/g, '*').replace(/÷/g, '/');
      const tokens = expr.match(/(\d+\.?\d*|\.\d+)|[+\-*/]/g);
      if (!tokens || !tokens.length) return 0;
      const first = parseFloat(tokens[0]);
      if (isNaN(first)) return 0;
      const values = [first];
      const ops = [];
      for (let k = 1; k < tokens.length; k += 2) {
        const op = tokens[k];
        const num = parseFloat(tokens[k + 1]);
        if (isNaN(num)) break;
        if (op === '*') values[values.length - 1] *= num;
        else if (op === '/') values[values.length - 1] = num === 0 ? 0 : values[values.length - 1] / num;
        else { values.push(num); ops.push(op); }
      }
      let result = values[0];
      for (let k = 0; k < ops.length; k++) {
        result = ops[k] === '+' ? result + values[k + 1] : result - values[k + 1];
      }
      return result;
    }

    function openCalc(targetId) {
      calcTargetId = targetId;
      const current = parseThousands(document.getElementById(targetId).value);
      calcExpr = current > 0 ? String(current) : '';
      calcRender();
      calcSheet.classList.remove('hidden');
    }

    function closeCalc() {
      calcSheet.classList.add('hidden');
    }

    document.querySelectorAll('.calc-open-btn').forEach((btn) => {
      btn.addEventListener('click', () => openCalc(btn.dataset.target));
    });
    document.getElementById('calc-close').addEventListener('click', closeCalc);
    calcSheet.addEventListener('click', (e) => { if (e.target === calcSheet) closeCalc(); });

    calcSheet.querySelectorAll('.calc-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        if (act === 'clear') { calcExpr = ''; calcRender(); return; }
        if (act === 'back') { calcExpr = calcExpr.slice(0, -1); calcRender(); return; }
        if (act === 'equals') {
          const result = calcEvaluate(calcExpr);
          const rounded = Math.max(0, Math.round(result));
          const target = document.getElementById(calcTargetId);
          target.value = formatThousands(String(rounded));
          target.dispatchEvent(new Event('input'));
          closeCalc();
          return;
        }
        // tombol angka / operator
        const v = btn.dataset.val;
        const last = calcExpr.slice(-1);
        const isOp = (c) => '+-×÷'.includes(c);
        if (isOp(v)) {
          if (calcExpr === '') return;       // jangan mulai dengan operator
          if (isOp(last)) calcExpr = calcExpr.slice(0, -1); // ganti operator beruntun
        }
        calcExpr += v;
        calcRender();
      });
    });

    // ---------- Tabs ----------

    function setTab(tab) {
      currentTab = tab;
      hideCatSuggestion(); // ganti tab → saran lama tidak relevan

      tabButtons.forEach((btn) => {
        btn.className = `${TAB_BASE_CLASSES} ${btn.dataset.tab === tab ? TAB_ACTIVE_CLASSES[tab] : TAB_INACTIVE_CLASSES}`;
      });

      if (tab === 'transfer') {
        formIncomeExpense.classList.add('hidden');
        formTransfer.classList.remove('hidden');
      } else {
        formTransfer.classList.add('hidden');
        formIncomeExpense.classList.remove('hidden');
        renderCategoryGrid(tab);
      }
    }

    tabButtons.forEach((btn) => {
      btn.addEventListener('click', () => setTab(btn.dataset.tab));
    });

    // ---------- Kategori ----------

    function renderCategoryGrid(type) {
      const categories = categoriesByType[type] || [];

      if (!categories.some((c) => c.id === selectedCategoryId)) {
        selectedCategoryId = null;
      }

      ieCategoryGrid.innerHTML = categories.map((cat) => {
        const colorClasses = getCategoryColorClasses(cat.color);
        const isSelected = cat.id === selectedCategoryId;
        return `
          <button type="button" class="category-option flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 transition-colors ${isSelected ? 'border-[#8B5CF6] bg-lavender-light/30' : 'border-transparent hover:bg-gray-50'}" data-id="${cat.id}">
            <div class="w-12 h-12 rounded-full flex items-center justify-center ${colorClasses.bg}">
              <i data-lucide="${cat.icon}" class="w-6 h-6 ${colorClasses.icon}"></i>
            </div>
            <span class="text-xs text-center text-gray-600 leading-tight line-clamp-2">${CATEGORY_SHORT_NAMES[cat.name] || cat.name}</span>
          </button>
        `;
      }).join('');

      ieCategoryGrid.insertAdjacentHTML('beforeend', `
        <button type="button" id="add-category-btn" class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 border-dashed border-gray-200 hover:border-[#8B5CF6] hover:bg-lavender-light/20 text-gray-400 hover:text-lavender-dark transition-colors">
          <div class="w-12 h-12 rounded-full flex items-center justify-center bg-gray-50">
            <i data-lucide="plus" class="w-6 h-6"></i>
          </div>
          <span class="text-xs text-center leading-tight">Tambah</span>
        </button>
      `);

      lucide.createIcons();

      ieCategoryGrid.querySelectorAll('.category-option').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (selectedCategoryId !== btn.dataset.id) selectedSubcategoryId = null;
          selectedCategoryId = btn.dataset.id;
          hideCatSuggestion(); // pilih kategori manual → sembunyikan banner saran
          renderCategoryGrid(type);
        });
      });

      document.getElementById('add-category-btn').addEventListener('click', () => {
        openCatPicker(type);
      });

      renderSubcategorySection();
    }

    // ---------- Sub-kategori ----------
    const subSection = document.getElementById('ie-subcategory-section');
    const subChips = document.getElementById('ie-subcategory-chips');
    const subNewWrap = document.getElementById('ie-subcategory-new');
    const subInput = document.getElementById('ie-subcategory-input');

    async function renderSubcategorySection() {
      if (!selectedCategoryId) { subSection.classList.add('hidden'); return; }
      subSection.classList.remove('hidden');

      // Fetch & cache sub-kategori untuk kategori ini.
      if (!subcategoriesByCategory.has(selectedCategoryId)) {
        try {
          const subs = await fetchSubcategories(currentUser.id, selectedCategoryId);
          subcategoriesByCategory.set(selectedCategoryId, subs);
        } catch (err) {
          console.log('[add] Gagal memuat sub-kategori:', err.message);
          subcategoriesByCategory.set(selectedCategoryId, []);
        }
      }
      const subs = subcategoriesByCategory.get(selectedCategoryId) || [];

      subChips.innerHTML = subs.map((s) => {
        const active = s.id === selectedSubcategoryId;
        return `<button type="button" data-sub-id="${s.id}" class="sub-chip flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${active ? 'bg-[#8B5CF6] text-white' : 'border border-gray-200 text-gray-500 hover:bg-gray-50'}">${s.name}</button>`;
      }).join('') +
        `<button type="button" id="ie-subcategory-add" class="flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium border border-dashed border-gray-300 text-gray-400 hover:border-[#8B5CF6] hover:text-lavender-dark transition-colors">+ Baru</button>`;

      subChips.querySelectorAll('.sub-chip').forEach((btn) => {
        btn.addEventListener('click', () => {
          selectedSubcategoryId = selectedSubcategoryId === btn.dataset.subId ? null : btn.dataset.subId;
          renderSubcategorySection();
        });
      });
      document.getElementById('ie-subcategory-add').addEventListener('click', () => {
        subNewWrap.classList.remove('hidden');
        subInput.focus();
      });
    }

    async function saveNewSubcategory() {
      const name = subInput.value.trim();
      if (!name || !selectedCategoryId) return;
      const btn = document.getElementById('ie-subcategory-save');
      btn.disabled = true; btn.textContent = '...';
      try {
        const sub = await createSubcategory({ userId: currentUser.id, categoryId: selectedCategoryId, name });
        const list = subcategoriesByCategory.get(selectedCategoryId) || [];
        list.push(sub);
        subcategoriesByCategory.set(selectedCategoryId, list);
        selectedSubcategoryId = sub.id;
        subInput.value = '';
        subNewWrap.classList.add('hidden');
        renderSubcategorySection();
      } catch (err) {
        showToast('Gagal menambah sub-kategori: ' + err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Tambah';
      }
    }
    document.getElementById('ie-subcategory-save').addEventListener('click', saveNewSubcategory);
    subInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); saveNewSubcategory(); } });

    // ---------- Tags ----------
    const tagsChips = document.getElementById('ie-tags-chips');
    const tagsInput = document.getElementById('ie-tags-input');

    function renderTags() {
      tagsChips.innerHTML = currentTags.map((t, i) =>
        `<span class="inline-flex items-center gap-1 bg-[#EDE9FE] text-[#8B5CF6] rounded-full px-2 py-0.5 text-xs">#${t}<button type="button" data-tag-idx="${i}" class="tag-remove hover:text-lavender-darker">&times;</button></span>`
      ).join('');
      tagsChips.querySelectorAll('.tag-remove').forEach((btn) => {
        btn.addEventListener('click', () => {
          currentTags.splice(Number(btn.dataset.tagIdx), 1);
          renderTags();
        });
      });
    }

    function addTag(raw) {
      const tag = raw.trim().replace(/^#/, '').toLowerCase();
      if (!tag) return;
      if (!currentTags.includes(tag)) currentTags.push(tag);
      renderTags();
    }

    tagsInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(tagsInput.value);
        tagsInput.value = '';
      }
    });

    // ---------- Smart categorization (saran kategori dari deskripsi) ----------
    const catSuggestionBanner = document.getElementById('ie-cat-suggestion');
    const catSuggestionName = document.getElementById('ie-cat-suggestion-name');
    const catSuggestionApply = document.getElementById('ie-cat-suggestion-apply');
    let suggestedCategoryId = null;
    let suggestTimer = null;

    function hideCatSuggestion() {
      suggestedCategoryId = null;
      catSuggestionBanner.classList.add('hidden');
    }

    function showCatSuggestion(categoryId) {
      const cat = (categoriesByType[currentTab] || []).find((c) => c.id === categoryId);
      if (!cat) { hideCatSuggestion(); return; }
      suggestedCategoryId = categoryId;
      catSuggestionName.textContent = CATEGORY_SHORT_NAMES[cat.name] || cat.name;
      catSuggestionBanner.classList.remove('hidden');
    }

    async function runSuggestion() {
      const desc = ieDescriptionInput.value.trim();
      if (!currentUser || desc.length < 3) { hideCatSuggestion(); return; }
      try {
        const result = await getSuggestedCategory(desc, currentUser.id, currentTab);
        // Jangan tampilkan kalau tidak ada saran, atau saran = kategori yang sudah dipilih.
        if (!result || result.categoryId === selectedCategoryId) { hideCatSuggestion(); return; }
        showCatSuggestion(result.categoryId);
      } catch (err) {
        console.log('[add] Gagal memuat saran kategori:', err.message);
        hideCatSuggestion();
      }
    }

    // Debounce 600ms: sembunyikan banner lama lalu evaluasi ulang setelah user berhenti mengetik.
    ieDescriptionInput.addEventListener('input', () => {
      hideCatSuggestion();
      if (suggestTimer) clearTimeout(suggestTimer);
      suggestTimer = setTimeout(runSuggestion, 600);
    });

    catSuggestionApply.addEventListener('click', () => {
      if (!suggestedCategoryId) return;
      if (selectedCategoryId !== suggestedCategoryId) selectedSubcategoryId = null;
      selectedCategoryId = suggestedCategoryId;
      hideCatSuggestion();
      renderCategoryGrid(currentTab);
      // Scroll ke kategori yang baru dipilih bila perlu.
      const selectedBtn = ieCategoryGrid.querySelector(`.category-option[data-id="${selectedCategoryId}"]`);
      if (selectedBtn) selectedBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ---------- Category picker modal ----------

    let newCatType = 'income';
    let newCatColor = 'lavender';
    let newCatIcon = 'circle';

    function openCatPicker(type) {
      newCatType = type;
      newCatColor = 'lavender';
      newCatIcon = 'circle';
      document.getElementById('new-cat-name').value = '';
      document.getElementById('cat-picker-error').classList.add('hidden');
      renderPickerTypePills();
      renderPickerColorGrid();
      renderPickerIconGroups();
      document.getElementById('cat-picker-modal').classList.remove('hidden');
    }

    function renderPickerTypePills() {
      document.querySelectorAll('[data-type-btn]').forEach(btn => {
        const active = btn.dataset.typeBtn === newCatType;
        btn.className = `px-4 py-2 rounded-full text-sm transition-colors ${active ? 'bg-[#8B5CF6] text-white font-semibold' : 'border border-gray-200 text-gray-500 font-medium hover:bg-gray-50'}`;
      });
    }

    function renderPickerColorGrid() {
      const grid = document.getElementById('picker-color-grid');
      grid.innerHTML = CATEGORY_COLORS.map(c =>
        `<button type="button" data-color="${c.name}" class="picker-color-dot w-8 h-8 rounded-full border-2 transition-all ${c.name === newCatColor ? 'border-gray-700 scale-110' : 'border-transparent hover:scale-105'}" style="background-color:${c.hex}"></button>`
      ).join('');
      grid.querySelectorAll('.picker-color-dot').forEach(btn => {
        btn.addEventListener('click', () => { newCatColor = btn.dataset.color; renderPickerColorGrid(); });
      });
    }

    function renderPickerIconGroups() {
      const container = document.getElementById('picker-icon-groups');
      container.innerHTML = ICON_GROUPS.map(group =>
        `<div>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">${group.label}</p>
          <div class="grid grid-cols-5 gap-1">
            ${group.icons.map(icon =>
              `<button type="button" data-icon="${icon}" class="picker-icon-btn w-full aspect-square rounded-xl flex items-center justify-center transition-colors ${icon === newCatIcon ? 'bg-lavender-light text-lavender-dark' : 'text-gray-400 hover:bg-gray-100'}">
                <i data-lucide="${icon}" class="w-5 h-5 pointer-events-none"></i>
              </button>`
            ).join('')}
          </div>
        </div>`
      ).join('');
      container.querySelectorAll('.picker-icon-btn').forEach(btn => {
        btn.addEventListener('click', () => { newCatIcon = btn.dataset.icon; renderPickerIconGroups(); lucide.createIcons(); });
      });
      lucide.createIcons();
    }

    document.getElementById('cat-picker-modal').addEventListener('click', e => {
      const typeBtn = e.target.closest('[data-type-btn]');
      if (typeBtn) { newCatType = typeBtn.dataset.typeBtn; renderPickerTypePills(); }
    });

    document.getElementById('cat-picker-close').addEventListener('click', () => {
      document.getElementById('cat-picker-modal').classList.add('hidden');
    });

    document.getElementById('cat-picker-save').addEventListener('click', async () => {
      if (window.blockIfDemo?.('Menyimpan kategori')) return;
      const name = document.getElementById('new-cat-name').value.trim();
      const errEl = document.getElementById('cat-picker-error');
      errEl.classList.add('hidden');
      if (!name) {
        errEl.textContent = 'Nama kategori wajib diisi.';
        errEl.classList.remove('hidden');
        return;
      }
      const saveBtn = document.getElementById('cat-picker-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';
      try {
        await createCategory({ name, type: newCatType, icon: newCatIcon, color: newCatColor, userId: currentUser.id });
        categoriesByType[newCatType] = await fetchCategories(newCatType, currentUser.id);
        document.getElementById('cat-picker-modal').classList.add('hidden');
        if (currentTab === newCatType) renderCategoryGrid(currentTab);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Simpan';
      }
    });

    // ---------- Dropdown akun ----------

    function populateAccountSelects() {
      const options = accounts.map((acc) => `<option value="${acc.id}">${acc.name}</option>`).join('');

      ieAccountSelect.innerHTML = options;
      trFromAccountSelect.innerHTML = options;
      renderToAccountOptions();
    }

    function renderToAccountOptions() {
      const fromId = trFromAccountSelect.value;
      const currentTo = trToAccountSelect.value;

      trToAccountSelect.innerHTML = accounts
        .filter((acc) => acc.id !== fromId)
        .map((acc) => `<option value="${acc.id}">${acc.name}</option>`)
        .join('');

      if (accounts.some((acc) => acc.id === currentTo && acc.id !== fromId)) {
        trToAccountSelect.value = currentTo;
      }
    }

    trFromAccountSelect.addEventListener('change', renderToAccountOptions);

    // ---------- Mode edit ----------

    async function loadEditTransaction(id) {
      let tx;
      try {
        tx = await fetchTransactionById(id, currentUser.id);
      } catch (err) {
        console.log('[add] Gagal memuat transaksi:', err.message);
        tx = null;
      }

      if (!tx) {
        queueToast('Transaksi tidak ditemukan.', 'error');
        window.location.href = 'home.html';
        return;
      }

      // Transfer (double-entry) tidak boleh diedit individual.
      if (tx.transfer_type || tx.type === 'transfer') {
        queueToast('Edit transfer tidak diizinkan. Hapus dan buat ulang.', 'error');
        window.location.href = 'transactions.html';
        return;
      }

      editingId = tx.id;
      pageTitle.textContent = 'Edit Transaksi';
      document.title = 'Poketto - Edit Transaksi';
      ieSubmitBtn.textContent = 'Update';
      trSubmitBtn.textContent = 'Update';

      if (tx.type === 'transfer') {
        setTab('transfer');
        trFromAccountSelect.value = tx.account_id;
        renderToAccountOptions();
        trToAccountSelect.value = tx.to_account_id;
        trAmountInput.value = formatThousands(String(Math.round(Number(tx.amount))));
        trDescriptionInput.value = tx.description || '';
        trDateInput.value = tx.date;
      } else {
        selectedCategoryId = tx.category_id;
        selectedSubcategoryId = tx.subcategory_id || null;
        currentTags = Array.isArray(tx.tags) ? [...tx.tags] : [];
        setTab(tx.type);
        renderTags();
        ieAccountSelect.value = tx.account_id;
        ieAmountInput.value = formatThousands(String(Math.round(Number(tx.amount))));
        ieDescriptionInput.value = tx.description || '';
        ieDateInput.value = tx.date;
      }
    }

    // ---------- Submit: Pemasukan / Pengeluaran ----------

    formIncomeExpense.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (window.blockIfDemo?.('Menyimpan transaksi')) return;
      ieError.classList.add('hidden');

      const accountId = ieAccountSelect.value;
      const amount = parseThousands(ieAmountInput.value);

      if (!accountId || !selectedCategoryId) {
        ieError.textContent = 'Akun dan kategori wajib dipilih.';
        ieError.classList.remove('hidden');
        return;
      }
      const ieValidation = validateAmount(amount);
      if (!ieValidation.valid) {
        ieError.textContent = ieValidation.message;
        ieError.classList.remove('hidden');
        shakeElement(ieAmountInput);
        return;
      }

      const resetLabel = editingId ? 'Update' : 'Simpan';
      ieSubmitBtn.disabled = true;
      ieSubmitBtn.textContent = 'Menyimpan...';

      const payload = {
        user_id: currentUser.id,
        account_id: accountId,
        category_id: selectedCategoryId,
        subcategory_id: selectedSubcategoryId || null,
        tags: currentTags.length ? currentTags : null,
        to_account_id: null,
        type: currentTab,
        amount,
        description: ieDescriptionInput.value.trim() || null,
        date: ieDateInput.value,
      };

      const isRecurring = !editingId && recurringToggle.checked;

      try {
        if (editingId) {
          await updateTransaction(editingId, payload);
        } else {
          await createTransaction(payload);
        }

        // Fitur 1 — buat jadwal transaksi berulang (scheduled_bills) untuk transaksi baru.
        if (isRecurring) {
          const frequency = document.getElementById('ie-frequency').value;
          const endDate = document.getElementById('ie-end-date').value || null;
          const notes = ieDescriptionInput.value.trim() || null;
          const [yy, mm, dd] = ieDateInput.value.split('-').map(Number);
          const catName = (categoriesByType[currentTab] || []).find((c) => c.id === selectedCategoryId)?.name;
          await createBill({
            user_id: currentUser.id,
            name: notes || catName || 'Transaksi Berulang',
            category_id: selectedCategoryId,
            account_id: accountId,
            amount,
            day_of_month: dd,
            frequency,
            next_due_date: computeRecurringNextDue(frequency, ieDateInput.value),
            end_date: endDate,
            notes,
            is_active: true,
          });
          queueToast('Transaksi berulang berhasil dibuat');
        } else {
          queueToast('Transaksi berhasil disimpan.');
        }
        window.location.href = 'home.html';
      } catch (err) {
        ieError.textContent = err.message;
        ieError.classList.remove('hidden');
        ieSubmitBtn.disabled = false;
        ieSubmitBtn.textContent = resetLabel;
      }
    });

    // Hitung jatuh tempo berikutnya setelah transaksi pertama, berdasarkan frekuensi.
    function computeRecurringNextDue(frequency, dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const base = new Date(y, m - 1, d);
      if (frequency === 'daily') base.setDate(base.getDate() + 1);
      else if (frequency === 'weekly') base.setDate(base.getDate() + 7);
      else if (frequency === 'yearly') base.setFullYear(base.getFullYear() + 1);
      else base.setMonth(base.getMonth() + 1); // monthly (default)
      return `${base.getFullYear()}-${String(base.getMonth() + 1).padStart(2, '0')}-${String(base.getDate()).padStart(2, '0')}`;
    }

    // ---------- Submit: Transfer ----------

    formTransfer.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (window.blockIfDemo?.('Menyimpan transfer')) return;
      trError.classList.add('hidden');

      const fromAccountId = trFromAccountSelect.value;
      const toAccountId = trToAccountSelect.value;
      const amount = parseThousands(trAmountInput.value);

      if (!fromAccountId || !toAccountId) {
        trError.textContent = 'Akun asal dan tujuan wajib dipilih.';
        trError.classList.remove('hidden');
        return;
      }
      if (fromAccountId === toAccountId) {
        trError.textContent = 'Akun asal dan tujuan tidak boleh sama.';
        trError.classList.remove('hidden');
        return;
      }
      const trValidation = validateAmount(amount);
      if (!trValidation.valid) {
        trError.textContent = trValidation.message;
        trError.classList.remove('hidden');
        shakeElement(trAmountInput);
        return;
      }

      trSubmitBtn.disabled = true;
      trSubmitBtn.textContent = 'Menyimpan...';

      // Double-entry: satu transfer = dua baris transaksi yang berbagi transfer_pair_id.
      const pairId = crypto.randomUUID();
      const fromName = accounts.find((a) => a.id === fromAccountId)?.name || 'akun';
      const toName = accounts.find((a) => a.id === toAccountId)?.name || 'akun';
      const userNote = trDescriptionInput.value.trim();
      const date = trDateInput.value;

      const rows = [
        {
          user_id: currentUser.id,
          account_id: fromAccountId,
          to_account_id: null,
          category_id: null,
          type: 'expense',
          transfer_type: 'transfer_out',
          transfer_pair_id: pairId,
          amount,
          description: userNote || `Transfer ke ${toName}`,
          date,
        },
        {
          user_id: currentUser.id,
          account_id: toAccountId,
          to_account_id: null,
          category_id: null,
          type: 'income',
          transfer_type: 'transfer_in',
          transfer_pair_id: pairId,
          amount,
          description: userNote || `Transfer dari ${fromName}`,
          date,
        },
      ];

      try {
        await createTransactions(rows);
        queueToast('Transfer berhasil dicatat');
        window.location.href = 'home.html';
      } catch (err) {
        trError.textContent = err.message;
        trError.classList.remove('hidden');
        trSubmitBtn.disabled = false;
        trSubmitBtn.textContent = 'Simpan';
      }
    });

    // ---------- Init ----------

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;

      try {
        accounts = await fetchAccounts(currentUser.id);
        categoriesByType.income = await fetchCategories('income', currentUser.id);
        categoriesByType.expense = await fetchCategories('expense', currentUser.id);
      } catch (err) {
        console.log('[add] Gagal memuat data awal:', err.message);
        showToast('Gagal memuat data: ' + err.message, 'error');
      }

      populateAccountSelects();

      const today = new Date().toISOString().slice(0, 10);
      ieDateInput.value = today;
      trDateInput.value = today;

      const editId = new URLSearchParams(window.location.search).get('edit');
      if (editId) {
        await loadEditTransaction(editId);
      } else {
        setTab('income');
      }
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
