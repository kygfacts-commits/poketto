<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

          <i data-lucide="plus" class="w-4 h-4"></i>

      </div>

      <!-- Summary cards -->

          <p id="sum-total" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-[#1E1B4B]">Rp0</p>

        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Dibayar Bulan Ini</p>
          <p id="sum-paid" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-mint">0</p>

        Memuat data…

      <!-- Active bills list -->

        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 mt-2">Nonaktif</p>
        <div id="inactive-list"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-12 text-center">
        <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-lavender-light/50 flex items-center justify-center">
          <i data-lucide="calendar-clock" class="w-8 h-8 text-lavender-dark"></i>

        <p class="text-gray-500 text-sm mb-5">Tambahkan tagihan rutin agar tidak terlewat setiap bulannya.</p>
        <button id="empty-add-btn" class="inline-flex items-center gap-2 bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-5 py-2.5 transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Tambah Tagihan Pertama</span>
        </button>
      </div>

    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- ===== MODALS ===== -->

  <!-- Bill modal (add / edit) -->
  <div id="bill-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6" style="max-height:90vh;overflow-y:auto">
      <div class="flex items-center justify-between mb-5">
        <h2 id="bill-modal-title" class="text-lg font-bold text-[#1E1B4B]">Tambah Tagihan</h2>
        <button id="bill-modal-close" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

          <input type="text" id="bill-name" placeholder="Contoh: Kontrakan, Netflix, Listrik"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="bill-category" class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
          <select id="bill-category"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
            <option value="">-- Pilih kategori --</option>
          </select>
        </div>
        <div>
          <label for="bill-account" class="block text-sm font-medium text-gray-700 mb-1">Akun Pembayaran</label>
          <select id="bill-account"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
            <option value="">-- Pilih akun --</option>
          </select>
        </div>
        <div>
          <label for="bill-amount" class="block text-sm font-medium text-gray-700 mb-1">Nominal</label>
          <input type="text" inputmode="numeric" id="bill-amount" placeholder="0"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="bill-day" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Bayar</label>
            <input type="number" id="bill-day" min="1" max="31" placeholder="1–31"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>
          <div>
            <label for="bill-frequency" class="block text-sm font-medium text-gray-700 mb-1">Frekuensi</label>
            <select id="bill-frequency"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
              <option value="monthly">Bulanan</option>
              <option value="weekly">Mingguan</option>
              <option value="yearly">Tahunan</option>
            </select>
          </div>
        </div>
        <p id="bill-form-error" class="hidden text-sm text-red-500"></p>
        <div class="flex gap-3 pt-1">
          <button type="button" id="bill-cancel"
            class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 text-sm hover:bg-gray-50 transition-colors">
            Batal
          </button>
          <button type="submit" id="bill-submit"
            class="flex-1 rounded-xl bg-lavender hover:bg-lavender-dark text-white font-semibold py-2.5 text-sm transition-colors">
            Tambah
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6 text-center">
      <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-rose-100 flex items-center justify-center">
        <i data-lucide="trash-2" class="w-6 h-6 text-rose-500"></i>
      </div>
      <h2 class="text-lg font-bold text-[#1E1B4B] mb-1">Hapus Tagihan?</h2>
      <p class="text-sm text-gray-500 mb-6">
        Tagihan "<span id="confirm-bill-name" class="font-medium text-gray-700"></span>" akan dihapus permanen.
      </p>
      <div class="flex gap-3">
        <button type="button" id="confirm-cancel"
          class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 text-sm hover:bg-gray-50 transition-colors">
          Batal
        </button>
        <button type="button" id="confirm-delete"
          class="flex-1 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 text-sm transition-colors">
          Hapus
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { formatCurrency, parseThousands, attachThousandsInput } from '../assets/js/utils.js';
    import { fetchAccounts } from '../assets/js/accounts.js';
    import { fetchCategories, getCategoryColorClasses } from '../assets/js/categories.js';
    import { createTransaction } from '../assets/js/add.js';
    import { showToast } from '../assets/js/toast.js';
    import { fetchBills, createBill, updateBill, deleteBill } from '../assets/js/bills.js';
    import { fetchProfileCurrency } from '../assets/js/home.js';

    // --- Constants ---
    const FREQUENCY_LABELS = { monthly: 'Bulanan', weekly: 'Mingguan', yearly: 'Tahunan' };

    function getBillStatusBadge(bill) {
      return bill.is_active
        ? `<span class="text-xs font-semibold bg-lavender-light/50 text-lavender-dark px-2 py-0.5 rounded-full">Aktif</span>`
        : `<span class="text-xs font-semibold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">Nonaktif</span>`;
    }
    const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    // --- State ---
    let currentUser, currency = 'IDR', accounts = [], bills = [], expenseCategories = [], categoriesById = new Map();
    let editingBillId = null, pendingDeleteBillId = null;

    // --- Date helpers ---
    function toISODate(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function computeNextDueDate(frequency, dayOfMonth) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayDay = today.getDate();
      const y = today.getFullYear();
      const m = today.getMonth();
      if (frequency === 'monthly') {
        return dayOfMonth >= todayDay
          ? toISODate(new Date(y, m, dayOfMonth))
          : toISODate(new Date(y, m + 1, dayOfMonth));
      }
      if (frequency === 'weekly') {
        const d = new Date(today); d.setDate(d.getDate() + 7);
        return toISODate(d);
      }
      if (frequency === 'yearly') {
        const thisYear = new Date(y, m, dayOfMonth);
        return thisYear >= today ? toISODate(thisYear) : toISODate(new Date(y + 1, m, dayOfMonth));
      }
      return toISODate(today);
    }

    function advanceNextDueDate(frequency, dayOfMonth, dueDateStr) {
      if (!dueDateStr) return toISODate(new Date());
      const [y, mo, d] = dueDateStr.split('-').map(Number);
      if (frequency === 'monthly') return toISODate(new Date(y, mo, dayOfMonth)); // mo is already 1-indexed; new Date month is 0-indexed → mo = next month
      if (frequency === 'weekly') { const nd = new Date(y, mo-1, d); nd.setDate(nd.getDate()+7); return toISODate(nd); }
      if (frequency === 'yearly') return toISODate(new Date(y+1, mo-1, dayOfMonth));
      return dueDateStr;
    }

    function renderDueBadge(dueDateStr) {
      if (!dueDateStr) return '';
      const [y, m, d] = dueDateStr.split('-').map(Number);
      const due = new Date(y, m-1, d);
      const today = new Date(); today.setHours(0,0,0,0);
      const days = Math.round((due - today) / 86400000);
      if (days > 0) return `<span class="text-gray-400">Jatuh tempo: ${days} hari lagi</span>`;
      if (days === 0) return `<span class="text-orange-500 font-medium">Jatuh tempo hari ini!</span>`;
      return `<span class="text-red-500 font-medium">Terlambat ${Math.abs(days)} hari</span>`;
    }

    function renderBillCard(bill) {
      const cat = categoriesById.get(bill.category_id);
      const cc = getCategoryColorClasses(cat?.color || 'slate');
      const freqLabel = FREQUENCY_LABELS[bill.frequency] || bill.frequency;
      const toggleIcon = bill.is_active ? 'pause-circle' : 'play-circle';
      const toggleTitle = bill.is_active ? 'Nonaktifkan' : 'Aktifkan';

      return `<div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4 mb-3 ${!bill.is_active ? 'opacity-60' : ''}">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center ${cc.bg}">
            <i data-lucide="${cat?.icon || 'circle'}" class="w-5 h-5 ${cc.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5 min-w-0">
              <p class="flex-1 min-w-0 font-semibold text-gray-800 truncate">${bill.name}</p>
              <span class="flex-shrink-0">${getBillStatusBadge(bill)}</span>
            </div>
            <p class="text-xs text-gray-500">${freqLabel} · Tgl ${bill.day_of_month}</p>
            <p class="text-xs mt-0.5">${renderDueBadge(bill.next_due_date)}</p>
          </div>
          <div class="flex-shrink-0 flex flex-col items-end gap-1.5">
            <p class="font-bold text-[#1E1B4B] text-sm">${formatCurrency(Number(bill.amount), currency)}</p>
            <div class="flex items-center gap-1">
              ${bill.is_active ? `<button type="button" data-bill-id="${bill.id}" class="pay-bill-btn text-xs font-semibold border border-[#8B5CF6] text-[#8B5CF6] px-2 py-1 rounded-lg hover:bg-lavender-light/50 transition-colors">Bayar</button>` : ''}
              <button type="button" data-bill-id="${bill.id}" class="toggle-bill-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors" title="${toggleTitle}">
                <i data-lucide="${toggleIcon}" class="w-4 h-4"></i>
              </button>
              <button type="button" data-bill-id="${bill.id}" class="edit-bill-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <i data-lucide="edit-2" class="w-4 h-4"></i>
              </button>
              <button type="button" data-bill-id="${bill.id}" class="delete-bill-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderSummary() {
      const active = bills.filter(b => b.is_active);
      const now = new Date();
      const tm = now.getMonth(), ty = now.getFullYear();
      const paid = active.filter(b => {
        if (!b.next_due_date) return false;
        const [y, m] = b.next_due_date.split('-').map(Number);
        return y > ty || (y === ty && m - 1 > tm);
      }).length;
      document.getElementById('sum-active').textContent = active.length;
      document.getElementById('sum-total').textContent = formatCurrency(active.reduce((s, b) => s + Number(b.amount), 0), currency);
      document.getElementById('sum-paid').textContent = paid;
    }

    function renderBills() {
      const active = bills.filter(b => b.is_active);
      const inactive = bills.filter(b => !b.is_active);

      document.getElementById('loading-state').classList.add('hidden');
      renderSummary();

      if (bills.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('bills-list').classList.add('hidden');
        document.getElementById('inactive-section').classList.add('hidden');
        lucide.createIcons();
        return;
      }
      document.getElementById('empty-state').classList.add('hidden');

      const listEl = document.getElementById('bills-list');
      listEl.classList.remove('hidden');
      listEl.innerHTML = active.length > 0
        ? active.map(b => renderBillCard(b)).join('')
        : '<p class="text-sm text-gray-400 text-center py-4">Tidak ada tagihan aktif.</p>';

      const inactiveSection = document.getElementById('inactive-section');
      if (inactive.length > 0) {
        document.getElementById('inactive-list').innerHTML = inactive.map(b => renderBillCard(b)).join('');
        inactiveSection.classList.remove('hidden');
      } else {
        inactiveSection.classList.add('hidden');
      }

      lucide.createIcons();
    }

    // --- Auto-generate due bills ---
    async function checkAndGenerateDueBills() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = toISODate(today);
      const monthYear = `${MONTH_NAMES[today.getMonth()]} ${today.getFullYear()}`;

      const dueBills = bills.filter(b => b.is_active && b.next_due_date && b.next_due_date <= todayStr);
      if (dueBills.length === 0) return;

      for (const bill of dueBills) {
        try {
          await createTransaction({
            user_id: currentUser.id,
            account_id: bill.account_id,
            type: 'expense',
            category_id: bill.category_id,
            amount: bill.amount,
            date: todayStr,
            description: `${bill.name} - ${monthYear}`,
          });
          const nextDue = advanceNextDueDate(bill.frequency, bill.day_of_month, bill.next_due_date);
          await updateBill(bill.id, { next_due_date: nextDue });
        } catch (err) {
          console.error('[auto-generate] error:', bill.name, err.message);
        }
      }

      showToast(`${dueBills.length} tagihan otomatis dibayarkan hari ini.`);
      bills = await fetchBills(currentUser.id);
      renderBills();
    }

    // --- Pay bill now ---
    async function handlePayBill(billId) {
      const bill = bills.find(b => b.id === billId);
      if (!bill) return;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = toISODate(today);
      const monthYear = `${MONTH_NAMES[today.getMonth()]} ${today.getFullYear()}`;

      try {
        await createTransaction({
          user_id: currentUser.id,
          account_id: bill.account_id,
          type: 'expense',
          category_id: bill.category_id,
          amount: bill.amount,
          date: todayStr,
          description: `${bill.name} - ${monthYear}`,
        });
        const nextDue = advanceNextDueDate(bill.frequency, bill.day_of_month, bill.next_due_date);
        await updateBill(billId, { next_due_date: nextDue });
        await loadBills();
        showToast(`Tagihan "${bill.name}" berhasil dibayar!`);
      } catch (err) {
        showToast('Gagal membayar: ' + err.message, 'error');
      }
    }

    // --- Toggle active/inactive ---
    async function handleToggleBill(billId) {
      const bill = bills.find(b => b.id === billId);
      if (!bill) return;
      try {
        await updateBill(billId, { is_active: !bill.is_active });
        await loadBills();
        showToast(bill.is_active ? `"${bill.name}" dinonaktifkan.` : `"${bill.name}" diaktifkan.`);
      } catch (err) {
        showToast('Gagal: ' + err.message, 'error');
      }
    }

    // --- Modal: Add/Edit Bill ---
    function populateCategorySelect(selectedId) {
      document.getElementById('bill-category').innerHTML =
        `<option value="">-- Pilih kategori --</option>` +
        expenseCategories.map(c => `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.name}</option>`).join('');
    }

    function populateAccountSelect(selectedId) {
      document.getElementById('bill-account').innerHTML =
        `<option value="">-- Pilih akun --</option>` +
        accounts.map(a => `<option value="${a.id}" ${a.id === selectedId ? 'selected' : ''}>${a.name}</option>`).join('');
    }

    function openBillModal(bill = null) {
      editingBillId = bill?.id || null;
      document.getElementById('bill-modal-title').textContent = bill ? 'Edit Tagihan' : 'Tambah Tagihan';
      document.getElementById('bill-submit').textContent = bill ? 'Simpan' : 'Tambah';
      document.getElementById('bill-name').value = bill?.name || '';
      document.getElementById('bill-amount').value = bill?.amount ? Number(bill.amount).toLocaleString('id-ID') : '';
      document.getElementById('bill-day').value = bill?.day_of_month || '';
      document.getElementById('bill-frequency').value = bill?.frequency || 'monthly';
      document.getElementById('bill-form-error').classList.add('hidden');
      populateCategorySelect(bill?.category_id || '');
      populateAccountSelect(bill?.account_id || '');
      document.getElementById('bill-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('bill-name').focus(), 50);
    }

    function closeBillModal() {
      document.getElementById('bill-modal').classList.add('hidden');
      editingBillId = null;
    }

    document.getElementById('add-bill-btn').addEventListener('click', () => openBillModal());
    document.getElementById('empty-add-btn').addEventListener('click', () => openBillModal());
    document.getElementById('bill-modal-close').addEventListener('click', closeBillModal);
    document.getElementById('bill-cancel').addEventListener('click', closeBillModal);

    document.getElementById('bill-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('bill-name').value.trim();
      const categoryId = document.getElementById('bill-category').value;
      const accountId = document.getElementById('bill-account').value;
      const amount = parseThousands(document.getElementById('bill-amount').value);
      const dayOfMonth = parseInt(document.getElementById('bill-day').value);
      const frequency = document.getElementById('bill-frequency').value;
      const errorEl = document.getElementById('bill-form-error');

      if (!name) { errorEl.textContent = 'Nama tagihan wajib diisi.'; errorEl.classList.remove('hidden'); return; }
      if (!categoryId) { errorEl.textContent = 'Pilih kategori.'; errorEl.classList.remove('hidden'); return; }
      if (!accountId) { errorEl.textContent = 'Pilih akun pembayaran.'; errorEl.classList.remove('hidden'); return; }
      if (!amount || amount <= 0) { errorEl.textContent = 'Nominal harus lebih dari 0.'; errorEl.classList.remove('hidden'); return; }
      if (!dayOfMonth || dayOfMonth < 1 || dayOfMonth > 31) { errorEl.textContent = 'Tanggal harus antara 1 dan 31.'; errorEl.classList.remove('hidden'); return; }
      errorEl.classList.add('hidden');

      const submitBtn = document.getElementById('bill-submit');
      submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan…';

      try {
        if (editingBillId) {
          const existing = bills.find(b => b.id === editingBillId);
          const needsRecompute = existing?.day_of_month !== dayOfMonth || existing?.frequency !== frequency;
          await updateBill(editingBillId, {
            name, category_id: categoryId, account_id: accountId, amount, day_of_month: dayOfMonth, frequency,
            ...(needsRecompute && { next_due_date: computeNextDueDate(frequency, dayOfMonth) }),
          });
        } else {
          await createBill({
            user_id: currentUser.id, name, category_id: categoryId, account_id: accountId,
            amount, day_of_month: dayOfMonth, frequency,
            next_due_date: computeNextDueDate(frequency, dayOfMonth),
            is_active: true,
          });
        }
        closeBillModal();
        await loadBills();
        showToast(editingBillId ? 'Tagihan berhasil diperbarui.' : 'Tagihan berhasil ditambahkan.');
      } catch (err) {
        errorEl.textContent = 'Gagal: ' + err.message;
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = editingBillId ? 'Simpan' : 'Tambah';
      }
    });

    // --- Modal: Confirm delete ---
    function openConfirmDelete(billId) {
      pendingDeleteBillId = billId;
      document.getElementById('confirm-bill-name').textContent = bills.find(b => b.id === billId)?.name || '';
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    document.getElementById('confirm-cancel').addEventListener('click', () => {
      document.getElementById('confirm-modal').classList.add('hidden');
      pendingDeleteBillId = null;
    });

    document.getElementById('confirm-delete').addEventListener('click', async () => {
      if (!pendingDeleteBillId) return;
      const btn = document.getElementById('confirm-delete');
      btn.disabled = true;
      try {
        await deleteBill(pendingDeleteBillId);
        document.getElementById('confirm-modal').classList.add('hidden');
        pendingDeleteBillId = null;
        await loadBills();
        showToast('Tagihan berhasil dihapus.');
      } catch (err) {
        showToast('Gagal menghapus: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    });

    // --- Event delegation ---
    document.getElementById('bills-list').addEventListener('click', (e) => {
      const payBtn = e.target.closest('.pay-bill-btn');
      const toggleBtn = e.target.closest('.toggle-bill-btn');
      const editBtn = e.target.closest('.edit-bill-btn');
      const delBtn = e.target.closest('.delete-bill-btn');
      if (payBtn) handlePayBill(payBtn.dataset.billId);
      else if (toggleBtn) handleToggleBill(toggleBtn.dataset.billId);
      else if (editBtn) openBillModal(bills.find(b => b.id === editBtn.dataset.billId));
      else if (delBtn) openConfirmDelete(delBtn.dataset.billId);
    });

    document.getElementById('inactive-list').addEventListener('click', (e) => {
      const toggleBtn = e.target.closest('.toggle-bill-btn');
      const editBtn = e.target.closest('.edit-bill-btn');
      const delBtn = e.target.closest('.delete-bill-btn');
      if (toggleBtn) handleToggleBill(toggleBtn.dataset.billId);
      else if (editBtn) openBillModal(bills.find(b => b.id === editBtn.dataset.billId));
      else if (delBtn) openConfirmDelete(delBtn.dataset.billId);
    });

    // --- Thousands input ---
    attachThousandsInput(document.getElementById('bill-amount'));

    // --- Data loading ---
    async function loadBills() {
      bills = await fetchBills(currentUser.id);
      renderBills();
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      try { currency = await fetchProfileCurrency(currentUser.id); } catch {}
      try { accounts = await fetchAccounts(currentUser.id); } catch {}
      try {
        expenseCategories = await fetchCategories('expense');
        categoriesById = new Map(expenseCategories.map(c => [c.id, c]));
      } catch {}
      await loadBills();
      await checkAndGenerateDueBills();
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
