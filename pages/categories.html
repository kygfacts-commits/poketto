<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Kelola Kategori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">

  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="px-4 py-5 md:px-10 md:py-8 max-w-2xl mx-auto">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-6">
        <a href="javascript:history.back()" class="p-2 rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <div>
          <h1 class="text-2xl font-bold text-[#1E1B4B]">Kelola Kategori</h1>
          <p class="text-sm text-gray-400 mt-0.5">Tambah dan atur kategori kustom</p>
        </div>
      </div>

      <!-- Type tabs -->
      <div class="flex gap-2 mb-5">
        <button type="button" id="tab-income" class="px-4 py-2 rounded-full text-sm font-semibold bg-[#8B5CF6] text-white transition-colors">Pemasukan</button>
        <button type="button" id="tab-expense" class="px-4 py-2 rounded-full text-sm font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">Pengeluaran</button>
      </div>

      <!-- Category list -->
      <div id="cat-list" class="space-y-2"></div>

      <!-- Add button (only for custom categories) -->
      <button type="button" id="add-cat-btn" class="w-full flex items-center justify-center gap-2 border-2 border-dashed border-lavender-dark/30 hover:border-lavender-dark text-lavender-dark font-semibold rounded-2xl py-3 mt-4 hover:bg-lavender-light/20 transition-colors">
        <i data-lucide="plus" class="w-5 h-5"></i>
        Tambah Kategori Kustom
      </button>
    </main>
  </div>

  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Full Category Modal (add / edit custom) -->
  <div id="cat-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full sm:max-w-md max-h-[92vh] flex flex-col shadow-xl">
      <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100 flex-shrink-0">
        <h3 id="modal-title" class="text-lg font-bold text-[#1E1B4B]">Tambah Kategori</h3>
        <button type="button" id="modal-close" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto px-5 py-4 space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nama Kategori</label>
          <input type="text" id="modal-name" placeholder="Contoh: Gaji" maxlength="30"
            class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6] text-sm">
        </div>
        <div id="modal-type-section">
          <label class="block text-sm font-medium text-gray-700 mb-2">Tipe</label>
          <div class="flex gap-2">
            <button type="button" data-type-btn="income" class="type-pick-btn px-4 py-2 rounded-full text-sm font-semibold bg-[#8B5CF6] text-white transition-colors">Pemasukan</button>
            <button type="button" data-type-btn="expense" class="type-pick-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">Pengeluaran</button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Warna</label>
          <div id="modal-color-grid" class="grid grid-cols-6 gap-2"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Ikon</label>
          <div id="modal-icon-groups" class="space-y-3"></div>
        </div>
      </div>
      <div class="px-5 pb-6 pt-3 border-t border-gray-100 flex-shrink-0">
        <p id="modal-error" class="hidden text-sm text-red-500 mb-2"></p>
        <button type="button" id="modal-save" class="w-full bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-2xl py-3 transition-colors">
          Simpan
        </button>
      </div>
    </div>
  </div>

  <!-- Color-only modal (for default category color edit) -->
  <div id="color-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-base text-[#1E1B4B]">Ubah Warna</h3>
        <button type="button" id="color-modal-close" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div id="color-modal-grid" class="grid grid-cols-6 gap-2 mb-4"></div>
      <button type="button" id="color-modal-save" class="w-full bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-2xl py-3 transition-colors">
        Simpan
      </button>
    </div>
  </div>

  <!-- Toggle (deactivate) confirmation modal -->
  <div id="toggle-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6 text-center">
      <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i data-lucide="eye-off" class="w-7 h-7 text-amber-500"></i>
      </div>
      <h2 class="text-base font-bold text-[#1E1B4B] mb-2">Nonaktifkan Kategori?</h2>
      <p class="text-sm text-gray-400 mb-5">Kategori tidak akan muncul saat menambah transaksi baru, tapi transaksi lama tetap aman.</p>
      <div class="flex gap-3">
        <button id="toggle-cancel" class="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Batal</button>
        <button id="toggle-confirm" class="flex-1 rounded-xl bg-amber-500 hover:bg-amber-600 text-white py-2.5 text-sm font-semibold transition-colors">Nonaktifkan</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation modal -->
  <div id="delete-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6 text-center">
      <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i data-lucide="trash-2" class="w-7 h-7 text-red-500"></i>
      </div>
      <h2 class="text-base font-bold text-[#1E1B4B] mb-2">Hapus Kategori?</h2>
      <p class="text-sm text-gray-400 mb-5">Tindakan ini tidak bisa dibatalkan.</p>
      <div class="flex gap-3">
        <button id="delete-cancel" class="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Batal</button>
        <button id="delete-confirm" class="flex-1 rounded-xl bg-red-500 hover:bg-red-600 text-white py-2.5 text-sm font-semibold transition-colors">Hapus</button>
      </div>
    </div>
  </div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { fetchCategories, getCategoryColorClasses, createCategory, updateCategory, updateCategoryColor, setCategoryActive, deleteCategory, CATEGORY_COLORS, ICON_GROUPS } from '../assets/js/categories.js';
    import { showToast } from '../assets/js/toast.js';

    let currentUser = null;
    let currentType = 'income';
    let categories = [];
    let modalColor = 'lavender';
    let modalIcon = 'circle';
    let modalSelectedType = 'income';
    let editingCatId = null;
    let colorOnlyCatId = null;
    let colorOnlySelected = 'lavender';
    let pendingToggleId = null;
    let pendingDeleteId = null;

    const TAB_ACTIVE = 'px-4 py-2 rounded-full text-sm font-semibold bg-[#8B5CF6] text-white transition-colors';
    const TAB_INACTIVE = 'px-4 py-2 rounded-full text-sm font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors';

    // ---------- Tab switching ----------

    document.getElementById('tab-income').addEventListener('click', () => setTab('income'));
    document.getElementById('tab-expense').addEventListener('click', () => setTab('expense'));

    async function setTab(type) {
      currentType = type;
      document.getElementById('tab-income').className = type === 'income' ? TAB_ACTIVE : TAB_INACTIVE;
      document.getElementById('tab-expense').className = type === 'expense' ? TAB_ACTIVE : TAB_INACTIVE;
      if (currentUser) await loadCategories();
    }

    const SVG_EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;
    const SVG_EYE = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.574-3.007-9.964-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`;

    // ---------- Render list ----------

    function renderList() {
      const list = document.getElementById('cat-list');
      const sorted = [...categories].sort((a, b) => (a.is_active === false ? 1 : 0) - (b.is_active === false ? 1 : 0));
      list.innerHTML = sorted.map(cat => {
        const cc = getCategoryColorClasses(cat.color || 'slate');
        const isCustom = !!cat.user_id;
        const isActive = cat.is_active !== false;

        return `<div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-3 flex items-center gap-3 ${!isActive ? 'opacity-50 grayscale' : ''}">
          <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${cc.bg}">
            <i data-lucide="${cat.icon || 'circle'}" class="w-5 h-5 ${cc.icon}"></i>
          </div>
          <div class="flex-1 min-w-0 flex items-center gap-1.5">
            <span class="font-medium text-gray-800 truncate">${cat.name}</span>
            ${!isActive ? '<span class="flex-shrink-0 bg-red-100 text-red-500 rounded-full px-2 py-0.5 text-xs font-semibold">Nonaktif</span>' : ''}
          </div>
          ${isCustom
            ? `<button data-id="${cat.id}" class="edit-cat-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors" title="Edit">
                <i data-lucide="edit-2" class="w-4 h-4"></i>
              </button>
              <button data-id="${cat.id}" class="delete-cat-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors" title="Hapus">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>`
            : `<button data-id="${cat.id}" class="edit-color-btn p-1.5 rounded-lg text-gray-400 hover:text-lavender-dark hover:bg-lavender-light/30 transition-colors" title="Ubah warna">
                <i data-lucide="palette" class="w-4 h-4"></i>
              </button>
              ${isActive
                ? `<button data-id="${cat.id}" class="toggle-cat-btn p-1.5 rounded-lg text-gray-400 hover:text-amber-500 hover:bg-amber-50 transition-colors" title="Nonaktifkan">${SVG_EYE_OFF}</button>`
                : `<button data-id="${cat.id}" class="activate-cat-btn p-1.5 rounded-lg text-gray-400 hover:text-green-500 hover:bg-green-50 transition-colors" title="Aktifkan">${SVG_EYE}</button>`
              }`
          }
        </div>`;
      }).join('');

      lucide.createIcons();

      list.querySelectorAll('.edit-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.id));
      });
      list.querySelectorAll('.delete-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => openDeleteModal(btn.dataset.id));
      });
      list.querySelectorAll('.edit-color-btn').forEach(btn => {
        btn.addEventListener('click', () => openColorModal(btn.dataset.id));
      });
      list.querySelectorAll('.toggle-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => openToggleModal(btn.dataset.id));
      });
      list.querySelectorAll('.activate-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => activateCategory(btn.dataset.id));
      });
    }

    // ---------- Color-only modal ----------

    function openColorModal(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat) return;
      colorOnlyCatId = id;
      colorOnlySelected = cat.color || 'lavender';
      renderColorModalGrid();
      document.getElementById('color-modal').classList.remove('hidden');
    }

    function renderColorModalGrid() {
      const grid = document.getElementById('color-modal-grid');
      grid.innerHTML = CATEGORY_COLORS.map(c =>
        `<button type="button" data-color="${c.name}" class="color-dot w-8 h-8 rounded-full border-2 transition-all ${c.name === colorOnlySelected ? 'border-gray-700 scale-110' : 'border-transparent hover:scale-105'}" style="background-color:${c.hex}"></button>`
      ).join('');
      grid.querySelectorAll('.color-dot').forEach(btn => {
        btn.addEventListener('click', () => { colorOnlySelected = btn.dataset.color; renderColorModalGrid(); });
      });
    }

    document.getElementById('color-modal-close').addEventListener('click', () => {
      document.getElementById('color-modal').classList.add('hidden');
      colorOnlyCatId = null;
    });

    document.getElementById('color-modal-save').addEventListener('click', async () => {
      if (!colorOnlyCatId) return;
      const saveBtn = document.getElementById('color-modal-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';
      try {
        await updateCategoryColor(colorOnlyCatId, colorOnlySelected);
        categories = await fetchCategories(currentType, currentUser.id, true);
        document.getElementById('color-modal').classList.add('hidden');
        colorOnlyCatId = null;
        renderList();
        showToast('Warna berhasil diperbarui');
      } catch (err) {
        console.error(err.message);
        showToast('Gagal memperbarui warna', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Simpan';
      }
    });

    // ---------- Toggle modal (deactivate) ----------

    function openToggleModal(id) {
      pendingToggleId = id;
      document.getElementById('toggle-modal').classList.remove('hidden');
    }

    async function activateCategory(id) {
      try {
        await setCategoryActive(id, true);
        categories = await fetchCategories(currentType, currentUser.id, true);
        renderList();
      } catch (err) {
        console.error(err.message);
      }
    }

    document.getElementById('toggle-cancel').addEventListener('click', () => {
      document.getElementById('toggle-modal').classList.add('hidden');
      pendingToggleId = null;
    });

    document.getElementById('toggle-confirm').addEventListener('click', async () => {
      if (!pendingToggleId) return;
      try {
        await setCategoryActive(pendingToggleId, false);
        categories = await fetchCategories(currentType, currentUser.id, true);
        document.getElementById('toggle-modal').classList.add('hidden');
        pendingToggleId = null;
        renderList();
      } catch (err) {
        document.getElementById('toggle-modal').classList.add('hidden');
        console.error(err.message);
      }
    });

    // ---------- Full edit modal helpers ----------

    function renderModalColorGrid() {
      const grid = document.getElementById('modal-color-grid');
      grid.innerHTML = CATEGORY_COLORS.map(c =>
        `<button type="button" data-color="${c.name}" class="modal-color-dot w-8 h-8 rounded-full border-2 transition-all ${c.name === modalColor ? 'border-gray-700 scale-110' : 'border-transparent hover:scale-105'}" style="background-color:${c.hex}"></button>`
      ).join('');
      grid.querySelectorAll('.modal-color-dot').forEach(btn => {
        btn.addEventListener('click', () => { modalColor = btn.dataset.color; renderModalColorGrid(); });
      });
    }

    function renderModalIconGroups() {
      const container = document.getElementById('modal-icon-groups');
      container.innerHTML = ICON_GROUPS.map(group =>
        `<div>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">${group.label}</p>
          <div class="grid grid-cols-5 gap-1">
            ${group.icons.map(icon =>
              `<button type="button" data-icon="${icon}" class="modal-icon-btn w-full aspect-square rounded-xl flex items-center justify-center transition-colors ${icon === modalIcon ? 'bg-lavender-light text-lavender-dark' : 'text-gray-400 hover:bg-gray-100'}">
                <i data-lucide="${icon}" class="w-5 h-5 pointer-events-none"></i>
              </button>`
            ).join('')}
          </div>
        </div>`
      ).join('');
      container.querySelectorAll('.modal-icon-btn').forEach(btn => {
        btn.addEventListener('click', () => { modalIcon = btn.dataset.icon; renderModalIconGroups(); lucide.createIcons(); });
      });
      lucide.createIcons();
    }

    function renderModalTypePills(type) {
      document.querySelectorAll('.type-pick-btn').forEach(btn => {
        const active = btn.dataset.typeBtn === type;
        btn.className = `type-pick-btn px-4 py-2 rounded-full text-sm transition-colors ${active ? 'bg-[#8B5CF6] text-white font-semibold' : 'border border-gray-200 text-gray-500 font-medium hover:bg-gray-50'}`;
      });
    }

    function openAddModal() {
      editingCatId = null;
      modalColor = 'lavender';
      modalIcon = 'circle';
      modalSelectedType = currentType;
      document.getElementById('modal-title').textContent = 'Tambah Kategori Kustom';
      document.getElementById('modal-name').value = '';
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('modal-type-section').classList.remove('hidden');
      renderModalTypePills(currentType);
      renderModalColorGrid();
      renderModalIconGroups();
      document.getElementById('cat-modal').classList.remove('hidden');
    }

    function openEditModal(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat || !cat.user_id) return;
      editingCatId = id;
      modalColor = cat.color || 'lavender';
      modalIcon = cat.icon || 'circle';
      modalSelectedType = cat.type;
      document.getElementById('modal-title').textContent = 'Edit Kategori';
      document.getElementById('modal-name').value = cat.name;
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('modal-type-section').classList.add('hidden');
      renderModalColorGrid();
      renderModalIconGroups();
      document.getElementById('cat-modal').classList.remove('hidden');
    }

    document.getElementById('cat-modal').addEventListener('click', e => {
      const typeBtn = e.target.closest('.type-pick-btn');
      if (typeBtn && !editingCatId) {
        modalSelectedType = typeBtn.dataset.typeBtn;
        renderModalTypePills(modalSelectedType);
      }
    });

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('cat-modal').classList.add('hidden');
    });

    // ---------- Save custom category ----------

    document.getElementById('modal-save').addEventListener('click', async () => {
      const name = document.getElementById('modal-name').value.trim();
      const errEl = document.getElementById('modal-error');
      errEl.classList.add('hidden');

      if (!name) {
        errEl.textContent = 'Nama kategori wajib diisi.';
        errEl.classList.remove('hidden');
        return;
      }

      const saveBtn = document.getElementById('modal-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Menyimpan...';

      try {
        if (editingCatId) {
          await updateCategory(editingCatId, { name, icon: modalIcon, color: modalColor });
        } else {
          await createCategory({ name, type: modalSelectedType, icon: modalIcon, color: modalColor, userId: currentUser.id });
          if (modalSelectedType !== currentType) await setTab(modalSelectedType);
        }
        categories = await fetchCategories(currentType, currentUser.id, true);
        document.getElementById('cat-modal').classList.add('hidden');
        renderList();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Simpan';
      }
    });

    // ---------- Delete custom category ----------

    function openDeleteModal(id) {
      pendingDeleteId = id;
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    document.getElementById('delete-cancel').addEventListener('click', () => {
      document.getElementById('delete-modal').classList.add('hidden');
      pendingDeleteId = null;
    });

    document.getElementById('delete-confirm').addEventListener('click', async () => {
      if (!pendingDeleteId) return;
      try {
        await deleteCategory(pendingDeleteId);
        categories = await fetchCategories(currentType, currentUser.id, true);
        document.getElementById('delete-modal').classList.add('hidden');
        pendingDeleteId = null;
        renderList();
      } catch (err) {
        document.getElementById('delete-modal').classList.add('hidden');
        console.error('Gagal menghapus:', err.message);
      }
    });

    document.getElementById('add-cat-btn').addEventListener('click', openAddModal);

    // ---------- Load ----------

    async function loadCategories() {
      categories = await fetchCategories(currentType, currentUser.id, true);
      renderList();
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      try {
        await loadCategories();
      } catch (err) {
        console.log('[categories]', err.message);
      }
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
