<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Goals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Main content -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="px-4 py-5 md:px-10 md:py-8 max-w-4xl mx-auto">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-[#1E1B4B]">Goals</h1>
        <button id="add-goal-btn" class="flex items-center gap-2 bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-4 py-2.5 text-sm transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Tambah Goal</span>
        </button>
      </div>

      <!-- Summary cards -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Goals Aktif</p>
          <p id="sum-count" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-lavender-dark">0</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Total Target</p>
          <p id="sum-target" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-[#1E1B4B]">Rp0</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4 col-span-2 sm:col-span-1">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Terkumpul</p>
          <p id="sum-saved" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-mint">Rp0</p>
        </div>
      </div>

      <!-- Loading state -->
      <div id="loading-state" class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-10 text-center text-gray-400 text-sm">
        Memuat data…
      </div>

      <!-- Active goals list -->
      <div id="goals-list" class="hidden"></div>

      <!-- Completed section -->
      <div id="completed-section" class="hidden">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 mt-2">Tercapai</p>
        <div id="completed-list"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-12 text-center">
        <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-lavender-light/50 flex items-center justify-center">
          <i data-lucide="target" class="w-8 h-8 text-lavender-dark"></i>
        </div>
        <h2 class="text-lg font-bold text-[#1E1B4B] mb-2">Belum ada target tabungan</h2>
        <p class="text-gray-500 text-sm mb-5">Buat goal pertamamu dan mulai menabung untuk mewujudkan impianmu.</p>
        <button id="empty-add-btn" class="inline-flex items-center gap-2 bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-5 py-2.5 transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Tambah Goal Pertama</span>
        </button>
      </div>

    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- ===== MODALS ===== -->

  <!-- Goal modal (add / edit) -->
  <div id="goal-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6" style="max-height:90vh;overflow-y:auto">
      <div class="flex items-center justify-between mb-5">
        <h2 id="goal-modal-title" class="text-lg font-bold text-[#1E1B4B]">Tambah Goal</h2>
        <button id="goal-modal-close" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="goal-form" class="space-y-4">
        <input type="hidden" id="goal-id">
        <div>
          <label for="goal-name" class="block text-sm font-medium text-gray-700 mb-1">Nama Goal</label>
          <input type="text" id="goal-name" placeholder="Contoh: Liburan ke Jepang"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Icon</label>
          <div id="icon-picker-grid" class="grid grid-cols-6 gap-1.5"></div>
        </div>
        <div>
          <label for="goal-target" class="block text-sm font-medium text-gray-700 mb-1">Target Tabungan</label>
          <input type="text" inputmode="numeric" id="goal-target" placeholder="0"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="goal-date" class="block text-sm font-medium text-gray-700 mb-1">
            Target Tanggal <span class="text-gray-400 font-normal">(opsional)</span>
          </label>
          <input type="date" id="goal-date"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="goal-account" class="block text-sm font-medium text-gray-700 mb-1">
            Akun Terkait <span class="text-gray-400 font-normal">(opsional)</span>
          </label>
          <select id="goal-account"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
            <option value="">-- Tidak ada --</option>
          </select>
        </div>
        <p id="goal-form-error" class="hidden text-sm text-red-500"></p>
        <div class="flex gap-3 pt-1">
          <button type="button" id="goal-cancel"
            class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 text-sm hover:bg-gray-50 transition-colors">
            Batal
          </button>
          <button type="submit" id="goal-submit"
            class="flex-1 rounded-xl bg-lavender hover:bg-lavender-dark text-white font-semibold py-2.5 text-sm transition-colors">
            Tambah
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Funds modal (Tambah Dana) -->
  <div id="funds-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-[#1E1B4B]">Tambah Dana</h2>
        <button id="funds-modal-close" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <p id="funds-goal-name" class="text-sm font-semibold text-lavender-dark mb-4"></p>
      <div class="space-y-4">
        <div>
          <label for="funds-amount" class="block text-sm font-medium text-gray-700 mb-1">Jumlah</label>
          <input type="text" inputmode="numeric" id="funds-amount" placeholder="0"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="funds-account" class="block text-sm font-medium text-gray-700 mb-1">
            Sumber Dana <span class="text-gray-400 font-normal">(opsional)</span>
          </label>
          <select id="funds-account"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
            <option value="">-- Tanpa potong saldo --</option>
          </select>
        </div>
        <p id="funds-error" class="hidden text-sm text-red-500"></p>
        <div class="flex gap-3">
          <button type="button" id="funds-cancel"
            class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 text-sm hover:bg-gray-50 transition-colors">
            Batal
          </button>
          <button type="button" id="funds-submit"
            class="flex-1 rounded-xl bg-lavender hover:bg-lavender-dark text-white font-semibold py-2.5 text-sm transition-colors">
            Tambah
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6 text-center">
      <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-rose-100 flex items-center justify-center">
        <i data-lucide="trash-2" class="w-6 h-6 text-rose-500"></i>
      </div>
      <h2 class="text-lg font-bold text-[#1E1B4B] mb-1">Hapus Goal?</h2>
      <p class="text-sm text-gray-500 mb-6">
        Goal "<span id="confirm-goal-name" class="font-medium text-gray-700"></span>" akan dihapus permanen.
      </p>
      <div class="flex gap-3">
        <button type="button" id="confirm-cancel"
          class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 text-sm hover:bg-gray-50 transition-colors">
          Batal
        </button>
        <button type="button" id="confirm-delete"
          class="flex-1 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 text-sm transition-colors">
          Hapus
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { formatCurrency, parseThousands, attachThousandsInput } from '../assets/js/utils.js';
    import { fetchAccounts } from '../assets/js/accounts.js';
    import { createTransaction } from '../assets/js/add.js';
    import { showToast } from '../assets/js/toast.js';
    import { fetchGoals, createGoal, updateGoal, deleteGoal } from '../assets/js/goals.js';
    import { fetchProfileCurrency } from '../assets/js/home.js';

    // --- Constants ---

    const GOAL_ICONS = [
      'target', 'plane', 'home', 'car', 'gift', 'heart',
      'star', 'shopping-bag', 'graduation-cap', 'music', 'camera', 'coffee',
      'laptop', 'bike', 'globe', 'piggy-bank',
    ];

    const GOAL_PALETTES = [
      { bg: 'bg-lavender-light/50', icon: 'text-lavender-dark', ring: '#A78BFA' },
      { bg: 'bg-peach-light/50',    icon: 'text-orange-500',    ring: '#FDBA8C' },
      { bg: 'bg-sky-light/50',      icon: 'text-sky-600',       ring: '#93C5FD' },
      { bg: 'bg-mint-light/50',     icon: 'text-emerald-600',   ring: '#86EFAC' },
      { bg: 'bg-rose-100',          icon: 'text-rose-500',      ring: '#FDA4AF' },
      { bg: 'bg-amber-100',         icon: 'text-amber-500',     ring: '#FCD34D' },
    ];

    // --- State ---
    let currentUser, currency = 'IDR', accounts = [], goals = [];
    let editingGoalId = null, fundsTargetGoalId = null, pendingDeleteGoalId = null;
    let selectedIcon = 'target';

    // --- Helpers ---
    function getPalette(goalId) {
      const hash = goalId.slice(0, 8).split('').reduce((s, c) => s + c.charCodeAt(0), 0);
      return GOAL_PALETTES[hash % GOAL_PALETTES.length];
    }

    function renderDateBadge(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      const target = new Date(y, m - 1, d);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const days = Math.round((target - today) / 86400000);
      if (days > 0) return `<span class="text-xs text-gray-400">${days} hari lagi</span>`;
      if (days === 0) return `<span class="text-xs text-orange-500 font-medium">Hari ini!</span>`;
      return `<span class="text-xs text-red-500 font-medium">Terlambat ${Math.abs(days)} hari</span>`;
    }

    function renderGoalCard(goal, palette, isCompleted) {
      const circ = 2 * Math.PI * 32;
      const pct = Number(goal.target_amount) > 0
        ? Math.min(100, (Number(goal.current_amount) / Number(goal.target_amount)) * 100)
        : 0;
      const offset = circ - (pct / 100) * circ;

      const dateBadge = !isCompleted ? renderDateBadge(goal.target_date) : '';
      const completedBadge = isCompleted
        ? `<span class="inline-flex items-center gap-1 text-xs font-semibold text-[#059669] bg-[#A7F3D0] px-2 py-0.5 rounded-full mt-0.5">✓ Tercapai</span>`
        : '';

      const actionBtns = isCompleted
        ? `<button type="button" data-goal-id="${goal.id}" class="delete-goal-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>`
        : `<button type="button" data-goal-id="${goal.id}" class="add-funds-btn flex items-center gap-1 bg-lavender-light/50 hover:bg-lavender-light text-lavender-dark text-xs font-semibold px-2 py-1.5 rounded-lg transition-colors">
            <i data-lucide="plus" class="w-3 h-3"></i>Dana
          </button>
          <button type="button" data-goal-id="${goal.id}" class="edit-goal-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
            <i data-lucide="edit-2" class="w-4 h-4"></i>
          </button>
          <button type="button" data-goal-id="${goal.id}" class="delete-goal-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>`;

      return `<div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4 mb-3 ${isCompleted ? 'opacity-60' : ''}">
        <div class="flex items-start gap-3 mb-4">
          <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center ${palette.bg}">
            <i data-lucide="${goal.icon || 'target'}" class="w-5 h-5 ${palette.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 truncate">${goal.name}</p>
            ${completedBadge}${dateBadge}
          </div>
          <div class="flex items-center gap-1 flex-shrink-0">
            ${actionBtns}
          </div>
        </div>
        <div class="flex items-center gap-4 mb-3">
          <svg viewBox="0 0 80 80" class="w-16 h-16 flex-shrink-0">
            <circle cx="40" cy="40" r="32" fill="none" stroke="#e5e7eb" stroke-width="8"/>
            <circle cx="40" cy="40" r="32" fill="none" stroke="${palette.ring}"
              stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${circ.toFixed(2)}"
              stroke-dashoffset="${offset.toFixed(2)}"
              transform="rotate(-90 40 40)"/>
            <text x="40" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">${Math.round(pct)}%</text>
          </svg>
          <div class="min-w-0">
            <p class="text-xl font-bold text-[#1E1B4B]">${formatCurrency(Number(goal.current_amount), currency)}</p>
            <p class="text-sm text-gray-400">dari ${formatCurrency(Number(goal.target_amount), currency)}</p>
          </div>
        </div>
        <div class="w-full bg-[#EDE9FE] rounded-full h-2">
          <div class="h-2 rounded-full transition-all" style="width:${pct.toFixed(1)}%;background-color:${palette.ring}"></div>
        </div>
      </div>`;
    }

    function renderGoals() {
      const active = goals.filter((g) => !g.is_completed);
      const completed = goals.filter((g) => g.is_completed);

      document.getElementById('loading-state').classList.add('hidden');

      // Summary
      const totalTarget = active.reduce((s, g) => s + Number(g.target_amount), 0);
      const totalSaved = active.reduce((s, g) => s + Number(g.current_amount), 0);
      document.getElementById('sum-count').textContent = active.length;
      document.getElementById('sum-target').textContent = formatCurrency(totalTarget, currency);
      document.getElementById('sum-saved').textContent = formatCurrency(totalSaved, currency);

      if (goals.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('goals-list').classList.add('hidden');
        document.getElementById('goals-list').innerHTML = '';
        document.getElementById('completed-section').classList.add('hidden');
        lucide.createIcons();
        return;
      }
      document.getElementById('empty-state').classList.add('hidden');

      const goalsListEl = document.getElementById('goals-list');
      goalsListEl.classList.remove('hidden');
      goalsListEl.innerHTML = active.length > 0
        ? active.map((g) => renderGoalCard(g, getPalette(g.id), false)).join('')
        : '<p class="text-sm text-gray-400 text-center py-4">Tidak ada goals aktif.</p>';

      const completedSection = document.getElementById('completed-section');
      if (completed.length > 0) {
        document.getElementById('completed-list').innerHTML = completed.map((g) => renderGoalCard(g, getPalette(g.id), true)).join('');
        completedSection.classList.remove('hidden');
      } else {
        completedSection.classList.add('hidden');
      }

      lucide.createIcons();
    }

    // --- Icon picker ---
    function renderIconPicker() {
      const grid = document.getElementById('icon-picker-grid');
      grid.innerHTML = GOAL_ICONS.map((icon) => {
        const active = icon === selectedIcon;
        const cls = active
          ? 'w-10 h-10 rounded-xl bg-lavender-light/50 flex items-center justify-center text-lavender-dark'
          : 'w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors';
        return `<button type="button" data-icon="${icon}" class="${cls}">
          <i data-lucide="${icon}" class="w-5 h-5"></i>
        </button>`;
      }).join('');
      lucide.createIcons();
    }

    function updateIconPickerHighlight() {
      document.querySelectorAll('#icon-picker-grid [data-icon]').forEach((b) => {
        b.className = b.dataset.icon === selectedIcon
          ? 'w-10 h-10 rounded-xl bg-lavender-light/50 flex items-center justify-center text-lavender-dark'
          : 'w-10 h-10 rounded-xl flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors';
      });
    }

    document.getElementById('icon-picker-grid').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-icon]');
      if (!btn) return;
      selectedIcon = btn.dataset.icon;
      updateIconPickerHighlight();
    });

    // --- Modal: Goal (add / edit) ---
    function openGoalModal(goal = null) {
      editingGoalId = goal?.id || null;
      selectedIcon = goal?.icon || 'target';

      document.getElementById('goal-modal-title').textContent = goal ? 'Edit Goal' : 'Tambah Goal';
      document.getElementById('goal-submit').textContent = goal ? 'Simpan' : 'Tambah';
      document.getElementById('goal-id').value = goal?.id || '';
      document.getElementById('goal-name').value = goal?.name || '';
      document.getElementById('goal-target').value = goal?.target_amount
        ? Number(goal.target_amount).toLocaleString('id-ID')
        : '';
      document.getElementById('goal-date').value = goal?.target_date || '';
      document.getElementById('goal-form-error').classList.add('hidden');

      const sel = document.getElementById('goal-account');
      sel.innerHTML = `<option value="">-- Tidak ada --</option>` +
        accounts.map((a) => `<option value="${a.id}" ${goal?.linked_account_id === a.id ? 'selected' : ''}>${a.name}</option>`).join('');

      renderIconPicker();
      document.getElementById('goal-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('goal-name').focus(), 50);
    }

    function closeGoalModal() {
      document.getElementById('goal-modal').classList.add('hidden');
      editingGoalId = null;
    }

    document.getElementById('add-goal-btn').addEventListener('click', () => openGoalModal());
    document.getElementById('empty-add-btn').addEventListener('click', () => openGoalModal());
    document.getElementById('goal-modal-close').addEventListener('click', closeGoalModal);
    document.getElementById('goal-cancel').addEventListener('click', closeGoalModal);

    document.getElementById('goal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('goal-name').value.trim();
      const target = parseThousands(document.getElementById('goal-target').value);
      const targetDate = document.getElementById('goal-date').value || null;
      const linkedAccountId = document.getElementById('goal-account').value || null;
      const errorEl = document.getElementById('goal-form-error');

      if (!name) { errorEl.textContent = 'Nama goal wajib diisi.'; errorEl.classList.remove('hidden'); return; }
      if (!target || target <= 0) { errorEl.textContent = 'Target amount harus lebih dari 0.'; errorEl.classList.remove('hidden'); return; }
      errorEl.classList.add('hidden');

      const submitBtn = document.getElementById('goal-submit');
      submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan…';

      try {
        if (editingGoalId) {
          await updateGoal(editingGoalId, { name, icon: selectedIcon, target_amount: target, target_date: targetDate, linked_account_id: linkedAccountId });
        } else {
          await createGoal({ user_id: currentUser.id, name, icon: selectedIcon, target_amount: target, current_amount: 0, target_date: targetDate, linked_account_id: linkedAccountId, is_completed: false });
        }
        closeGoalModal();
        await loadGoals();
        showToast(editingGoalId ? 'Goal berhasil diperbarui.' : 'Goal berhasil ditambahkan.');
      } catch (err) {
        errorEl.textContent = 'Gagal: ' + err.message;
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = editingGoalId ? 'Simpan' : 'Tambah';
      }
    });

    // --- Modal: Tambah Dana ---
    function openFundsModal(goalId) {
      const goal = goals.find((g) => g.id === goalId);
      fundsTargetGoalId = goalId;
      document.getElementById('funds-goal-name').textContent = goal?.name || '';
      document.getElementById('funds-amount').value = '';
      document.getElementById('funds-error').classList.add('hidden');

      const sel = document.getElementById('funds-account');
      sel.innerHTML = `<option value="">-- Tanpa potong saldo --</option>` +
        accounts.map((a) => `<option value="${a.id}">${a.name}</option>`).join('');

      document.getElementById('funds-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('funds-amount').focus(), 50);
    }

    function closeFundsModal() {
      document.getElementById('funds-modal').classList.add('hidden');
      fundsTargetGoalId = null;
    }

    document.getElementById('funds-modal-close').addEventListener('click', closeFundsModal);
    document.getElementById('funds-cancel').addEventListener('click', closeFundsModal);

    document.getElementById('funds-submit').addEventListener('click', async () => {
      const amount = parseThousands(document.getElementById('funds-amount').value);
      const accountId = document.getElementById('funds-account').value || null;
      const errorEl = document.getElementById('funds-error');

      if (!amount || amount <= 0) {
        errorEl.textContent = 'Jumlah harus lebih dari 0.';
        errorEl.classList.remove('hidden');
        return;
      }
      errorEl.classList.add('hidden');

      const submitBtn = document.getElementById('funds-submit');
      submitBtn.disabled = true; submitBtn.textContent = 'Menambahkan…';

      try {
        const goal = goals.find((g) => g.id === fundsTargetGoalId);

        if (accountId) {
          const today = new Date();
          const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
          await createTransaction({
            user_id: currentUser.id,
            account_id: accountId,
            type: 'expense',
            amount,
            date: dateStr,
            description: `Nabung: ${goal.name}`,
          });
        }

        const newAmount = Number(goal.current_amount) + amount;
        const isCompleted = newAmount >= Number(goal.target_amount);

        await updateGoal(fundsTargetGoalId, {
          current_amount: newAmount,
          ...(isCompleted && { is_completed: true }),
        });

        closeFundsModal();
        await loadGoals();

        if (isCompleted) {
          showToast(`Selamat! Goal "${goal.name}" tercapai! 🎉`, 'success');
        } else {
          showToast('Dana berhasil ditambahkan.');
        }
      } catch (err) {
        errorEl.textContent = 'Gagal: ' + err.message;
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Tambah';
      }
    });

    // --- Modal: Confirm delete ---
    function openConfirmDelete(goalId) {
      const goal = goals.find((g) => g.id === goalId);
      pendingDeleteGoalId = goalId;
      document.getElementById('confirm-goal-name').textContent = goal?.name || '';
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    document.getElementById('confirm-cancel').addEventListener('click', () => {
      document.getElementById('confirm-modal').classList.add('hidden');
      pendingDeleteGoalId = null;
    });

    document.getElementById('confirm-delete').addEventListener('click', async () => {
      if (!pendingDeleteGoalId) return;
      const btn = document.getElementById('confirm-delete');
      btn.disabled = true;
      try {
        await deleteGoal(pendingDeleteGoalId);
        document.getElementById('confirm-modal').classList.add('hidden');
        pendingDeleteGoalId = null;
        await loadGoals();
        showToast('Goal berhasil dihapus.');
      } catch (err) {
        showToast('Gagal menghapus: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    });

    // --- Event delegation for goal cards ---
    document.getElementById('goals-list').addEventListener('click', (e) => {
      const addBtn = e.target.closest('.add-funds-btn');
      const editBtn = e.target.closest('.edit-goal-btn');
      const delBtn = e.target.closest('.delete-goal-btn');
      if (addBtn) openFundsModal(addBtn.dataset.goalId);
      else if (editBtn) openGoalModal(goals.find((g) => g.id === editBtn.dataset.goalId));
      else if (delBtn) openConfirmDelete(delBtn.dataset.goalId);
    });

    document.getElementById('completed-list').addEventListener('click', (e) => {
      const delBtn = e.target.closest('.delete-goal-btn');
      if (delBtn) openConfirmDelete(delBtn.dataset.goalId);
    });

    // --- Thousands input formatting ---
    attachThousandsInput(document.getElementById('goal-target'));
    attachThousandsInput(document.getElementById('funds-amount'));

    // --- Data loading ---
    async function loadGoals() {
      goals = await fetchGoals(currentUser.id);
      renderGoals();
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      try { currency = await fetchProfileCurrency(currentUser.id); } catch {}
      try { accounts = await fetchAccounts(currentUser.id); } catch {}
      await loadGoals();
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
