<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Liabilitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="../assets/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poketto">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Main content -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="px-4 py-5 md:px-10 md:py-8 max-w-4xl mx-auto">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-[#1E1B4B]">Liabilitas</h1>
          <p class="text-sm text-gray-400 mt-0.5">Kelola hutang & cicilan kamu</p>
        </div>
        <button id="add-liability-btn" class="flex items-center gap-2 bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-4 py-2.5 transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Tambah</span>
        </button>
      </div>

      <!-- Summary cards -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Total Hutang</p>
          <p id="sum-total" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-peach">Rp0</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Cicilan/Bulan</p>
          <p id="sum-monthly" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-amber-500">Rp0</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4 col-span-2 sm:col-span-1">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Terbayar</p>
          <p id="sum-paid" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-mint">Rp0</p>
        </div>
      </div>

      <!-- List -->
      <div id="liability-list" class="space-y-4"></div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-10 text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-lavender-light/50 flex items-center justify-center">
          <i data-lucide="credit-card" class="w-7 h-7 text-lavender-dark"></i>
        </div>
        <h2 class="text-lg font-bold text-[#1E1B4B] mb-1">Belum ada liabilitas</h2>
        <p class="text-gray-500 mb-4">Catat hutang & cicilan kamu agar net worth lebih akurat.</p>
        <button id="empty-add-btn" class="inline-flex items-center gap-2 bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-5 py-2.5 transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span>Tambah Liabilitas Pertama</span>
        </button>
      </div>
    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Modal: Tambah/Edit Liabilitas -->
  <div id="liability-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h2 id="liability-modal-title" class="text-lg font-bold text-[#1E1B4B]">Tambah Liabilitas</h2>
        <button type="button" id="liability-modal-close" class="text-gray-400 hover:text-gray-600">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <form id="liability-form" class="space-y-4">
        <input type="hidden" id="liability-id">

        <div>
          <label for="liability-name" class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
          <input type="text" id="liability-name" placeholder="Contoh: KPR Rumah" maxlength="60"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>

        <div>
          <label for="liability-type" class="block text-sm font-medium text-gray-700 mb-1">Tipe</label>
          <select id="liability-type"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender"></select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="liability-total" class="block text-sm font-medium text-gray-700 mb-1">Total Hutang</label>
            <input type="text" inputmode="numeric" id="liability-total" placeholder="0"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>
          <div>
            <label for="liability-paid" class="block text-sm font-medium text-gray-700 mb-1">Sudah Dibayar</label>
            <input type="text" inputmode="numeric" id="liability-paid" placeholder="0"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="liability-interest" class="block text-sm font-medium text-gray-700 mb-1">Bunga (% / tahun)</label>
            <input type="number" step="any" min="0" id="liability-interest" placeholder="0"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>
          <div>
            <label for="liability-due" class="block text-sm font-medium text-gray-700 mb-1">Jatuh Tempo</label>
            <input type="date" id="liability-due"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>
        </div>

        <div>
          <label for="liability-monthly" class="block text-sm font-medium text-gray-700 mb-1">Cicilan / Bulan</label>
          <input type="text" inputmode="numeric" id="liability-monthly" placeholder="0"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>

        <div>
          <label for="liability-notes" class="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
          <input type="text" id="liability-notes" placeholder="Opsional" maxlength="120"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>

        <p id="liability-form-error" class="hidden text-sm text-red-500"></p>

        <div class="flex gap-3 pt-2">
          <button type="button" id="liability-cancel" class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 hover:bg-gray-50 transition-colors">
            Batal
          </button>
          <button type="submit" id="liability-submit" class="flex-1 rounded-xl bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold py-2.5 transition-colors">
            Simpan
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Konfirmasi Hapus -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-6 text-center">
      <div class="w-12 h-12 mx-auto mb-3 rounded-full bg-rose-100 flex items-center justify-center">
        <i data-lucide="trash-2" class="w-6 h-6 text-rose-500"></i>
      </div>
      <h2 class="text-lg font-bold text-[#1E1B4B] mb-1">Hapus Liabilitas?</h2>
      <p class="text-sm text-gray-500 mb-6">
        "<span id="confirm-liability-name" class="font-medium text-gray-700"></span>" akan dihapus permanen.
      </p>
      <div class="flex gap-3">
        <button type="button" id="confirm-cancel" class="flex-1 rounded-xl border border-gray-200 text-gray-600 font-semibold py-2.5 hover:bg-gray-50 transition-colors">
          Batal
        </button>
        <button type="button" id="confirm-delete" class="flex-1 rounded-xl bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 transition-colors">
          Hapus
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { formatCurrency, formatDate, parseThousands, attachThousandsInput, validateAmount, shakeElement } from '../assets/js/utils.js';
    import { fetchProfileCurrency } from '../assets/js/home.js';
    import {
      LIABILITY_TYPES,
      getLiabilityTypeLabel,
      fetchLiabilities,
      createLiability,
      updateLiability,
      deleteLiability,
    } from '../assets/js/liabilities.js';
    import { showToast } from '../assets/js/toast.js';

    // ---------- Elements ----------
    const listEl = document.getElementById('liability-list');
    const emptyState = document.getElementById('empty-state');
    const modal = document.getElementById('liability-modal');
    const modalTitle = document.getElementById('liability-modal-title');
    const form = document.getElementById('liability-form');
    const idInput = document.getElementById('liability-id');
    const nameInput = document.getElementById('liability-name');
    const typeSelect = document.getElementById('liability-type');
    const totalInput = document.getElementById('liability-total');
    const paidInput = document.getElementById('liability-paid');
    const interestInput = document.getElementById('liability-interest');
    const dueInput = document.getElementById('liability-due');
    const monthlyInput = document.getElementById('liability-monthly');
    const notesInput = document.getElementById('liability-notes');
    const formError = document.getElementById('liability-form-error');
    const submitBtn = document.getElementById('liability-submit');
    const confirmModal = document.getElementById('confirm-modal');

    // ---------- State ----------
    let currentUser = null;
    let currency = 'IDR';
    let liabilities = [];
    let pendingDelete = null;

    attachThousandsInput(totalInput);
    attachThousandsInput(paidInput);
    attachThousandsInput(monthlyInput);

    typeSelect.innerHTML = LIABILITY_TYPES.map((t) => `<option value="${t.value}">${t.label}</option>`).join('');

    // ---------- Render ----------
    function renderSummary() {
      const totalRemaining = liabilities.reduce((s, l) => s + Number(l.remaining_amount || 0), 0);
      const totalMonthly = liabilities.reduce((s, l) => s + Number(l.monthly_payment || 0), 0);
      const totalPaid = liabilities.reduce((s, l) => s + (Number(l.total_amount || 0) - Number(l.remaining_amount || 0)), 0);
      document.getElementById('sum-total').textContent = formatCurrency(totalRemaining, currency);
      document.getElementById('sum-monthly').textContent = formatCurrency(totalMonthly, currency);
      document.getElementById('sum-paid').textContent = formatCurrency(Math.max(0, totalPaid), currency);
    }

    function renderList() {
      if (liabilities.length === 0) {
        listEl.innerHTML = '';
        emptyState.classList.remove('hidden');
        lucide.createIcons();
        return;
      }
      emptyState.classList.add('hidden');

      listEl.innerHTML = liabilities.map((l) => {
        const total = Number(l.total_amount || 0);
        const remaining = Number(l.remaining_amount || 0);
        const paid = Math.max(0, total - remaining);
        const pct = total > 0 ? Math.min(100, Math.round((paid / total) * 100)) : 0;
        const interest = Number(l.interest_rate || 0);
        const dueStr = l.due_date ? formatDate(l.due_date) : '–';

        return `
          <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
            <div class="flex items-center justify-between gap-2 mb-3">
              <div class="flex items-center gap-2 min-w-0">
                <p class="font-semibold text-gray-800 truncate">${l.name}</p>
                <span class="text-xs font-semibold bg-lavender-light/60 text-lavender-dark rounded-full px-2 py-0.5 whitespace-nowrap">${getLiabilityTypeLabel(l.type)}</span>
              </div>
              <div class="flex gap-1 flex-shrink-0">
                <button class="edit-btn p-2 rounded-lg hover:bg-gray-50 text-gray-400 hover:text-lavender-dark transition-colors" data-id="${l.id}" title="Edit">
                  <i data-lucide="pencil" class="w-4 h-4"></i>
                </button>
                <button class="delete-btn p-2 rounded-lg hover:bg-gray-50 text-gray-400 hover:text-red-500 transition-colors" data-id="${l.id}" title="Hapus">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            <div class="w-full h-2 rounded-full bg-[#EDE9FE] overflow-hidden mb-2">
              <div class="h-full rounded-full bg-mint" style="width:${pct}%"></div>
            </div>
            <div class="flex items-center justify-between text-xs text-gray-500 mb-1">
              <span>${formatCurrency(remaining, currency)} / ${formatCurrency(total, currency)} sisa</span>
              <span>${pct}% terbayar</span>
            </div>
            <div class="flex items-center justify-between text-xs text-gray-400">
              <span>Bunga ${interest}% • Jatuh tempo ${dueStr}</span>
            </div>
            <p class="text-xs text-gray-500 mt-1">Cicilan/bulan: <span class="font-semibold text-gray-700">${formatCurrency(Number(l.monthly_payment || 0), currency)}</span></p>
            ${l.notes ? `<p class="text-xs text-gray-400 mt-1 truncate">${l.notes}</p>` : ''}
          </div>
        `;
      }).join('');

      lucide.createIcons();

      listEl.querySelectorAll('.edit-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const l = liabilities.find((x) => x.id === btn.dataset.id);
          if (l) openModal(l);
        });
      });
      listEl.querySelectorAll('.delete-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const l = liabilities.find((x) => x.id === btn.dataset.id);
          if (l) openConfirmModal(l);
        });
      });
    }

    // ---------- Modal ----------
    function openModal(liability = null) {
      formError.classList.add('hidden');
      form.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Simpan';

      if (liability) {
        modalTitle.textContent = 'Edit Liabilitas';
        idInput.value = liability.id;
        nameInput.value = liability.name || '';
        typeSelect.value = liability.type || 'hutang';
        totalInput.value = liability.total_amount ? Number(liability.total_amount).toLocaleString('id-ID') : '';
        const paid = Math.max(0, Number(liability.total_amount || 0) - Number(liability.remaining_amount || 0));
        paidInput.value = paid ? paid.toLocaleString('id-ID') : '';
        interestInput.value = liability.interest_rate ?? '';
        dueInput.value = liability.due_date || '';
        monthlyInput.value = liability.monthly_payment ? Number(liability.monthly_payment).toLocaleString('id-ID') : '';
        notesInput.value = liability.notes || '';
      } else {
        modalTitle.textContent = 'Tambah Liabilitas';
        idInput.value = '';
      }

      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
    }

    document.getElementById('add-liability-btn').addEventListener('click', () => openModal());
    document.getElementById('empty-add-btn').addEventListener('click', () => openModal());
    document.getElementById('liability-modal-close').addEventListener('click', closeModal);
    document.getElementById('liability-cancel').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;
      if (window.blockIfDemo?.('Menyimpan liabilitas')) return;
      formError.classList.add('hidden');

      const name = nameInput.value.trim();
      const total = parseThousands(totalInput.value);
      const paid = parseThousands(paidInput.value) || 0;
      const interest = parseFloat(interestInput.value) || 0;
      const monthly = parseThousands(monthlyInput.value) || 0;

      if (!name) {
        formError.textContent = 'Nama wajib diisi.';
        formError.classList.remove('hidden');
        shakeElement(nameInput);
        return;
      }
      const totalCheck = validateAmount(total, 1);
      if (!totalCheck.valid) {
        formError.textContent = 'Total hutang: ' + totalCheck.message;
        formError.classList.remove('hidden');
        shakeElement(totalInput);
        return;
      }
      if (paid > total) {
        formError.textContent = 'Sudah dibayar tidak boleh lebih dari total hutang.';
        formError.classList.remove('hidden');
        shakeElement(paidInput);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Menyimpan...';

      const payload = {
        name,
        type: typeSelect.value,
        total_amount: total,
        remaining_amount: total - paid,
        interest_rate: interest,
        due_date: dueInput.value || null,
        monthly_payment: monthly,
        notes: notesInput.value.trim() || null,
      };

      try {
        if (idInput.value) {
          await updateLiability(idInput.value, payload);
          showToast('Liabilitas berhasil diupdate');
        } else {
          await createLiability({ ...payload, user_id: currentUser.id });
          showToast('Liabilitas berhasil ditambahkan');
        }
        closeModal();
        liabilities = await fetchLiabilities(currentUser.id);
        renderSummary();
        renderList();
      } catch (err) {
        formError.textContent = err.message;
        formError.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Simpan';
      }
    });

    // ---------- Konfirmasi hapus ----------
    function openConfirmModal(liability) {
      pendingDelete = liability;
      document.getElementById('confirm-liability-name').textContent = liability.name;
      confirmModal.classList.remove('hidden');
    }
    function closeConfirmModal() {
      pendingDelete = null;
      confirmModal.classList.add('hidden');
    }
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirmModal);
    confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) closeConfirmModal(); });
    document.getElementById('confirm-delete').addEventListener('click', async () => {
      if (!pendingDelete) return;
      if (window.blockIfDemo?.('Menghapus liabilitas')) return;
      try {
        await deleteLiability(pendingDelete.id);
        showToast('Liabilitas dihapus');
        closeConfirmModal();
        liabilities = await fetchLiabilities(currentUser.id);
        renderSummary();
        renderList();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    // ---------- Init ----------
    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      // 2 query independen → satu Promise.all.
      const [curr, liabs] = await Promise.all([
        fetchProfileCurrency(currentUser.id).catch(() => currency),
        fetchLiabilities(currentUser.id).catch((err) => {
          console.log('[liabilities] Gagal memuat data:', err.message);
          showToast('Gagal memuat data: ' + err.message, 'error');
          return liabilities;
        }),
      ]);
      currency = curr;
      liabilities = liabs;
      renderSummary();
      renderList();
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
