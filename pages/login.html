<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Masuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lavender: { light: '#C4B5FD', DEFAULT: '#A78BFA', dark: '#8B5CF6' },
            peach: { light: '#FED7AA', DEFAULT: '#FDBA8C' },
            sky: { light: '#BFDBFE', DEFAULT: '#93C5FD' },
            mint: { light: '#BBF7D0', DEFAULT: '#86EFAC' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-lavender-light/40 via-sky-light/40 to-peach-light/40 p-4">
  <div class="w-full max-w-md">
    <a href="../index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-lavender-dark mb-6 transition-colors">
      &larr; Kembali ke Beranda
    </a>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h1 class="text-2xl font-bold text-lavender-dark mb-1">Masuk ke Poketto</h1>
      <p class="text-gray-500 text-sm mb-6">Kelola keuanganmu dengan tenang.</p>

      <p id="login-message" class="hidden mb-4 text-sm rounded-lg px-3 py-2"></p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>

        <p id="login-error" class="hidden text-sm text-red-500"></p>

        <button type="submit" id="login-submit"
          class="w-full bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl py-2.5 transition-colors">
          Masuk
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Belum punya akun?
        <a href="register.html" class="text-lavender-dark font-medium hover:underline">Daftar di sini</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login } from '../assets/js/auth.js';

    // Tampilkan pesan dari query string (misal setelah register: "Cek email")
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message');
    if (message) {
      const messageEl = document.getElementById('login-message');
      messageEl.textContent = message;
      messageEl.className = 'mb-4 text-sm rounded-lg px-3 py-2 bg-mint-light text-emerald-700';
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await login(email, password);

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
