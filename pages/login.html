<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Masuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-lavender-light/60 via-sky-light/40 to-peach-light/40 p-4 font-sans">
  <div class="w-full max-w-md">
    <a href="../index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-lavender-dark mb-6 transition-colors">
      &larr; Kembali ke Beranda
    </a>

    <div class="bg-white rounded-2xl shadow-md border border-[#EDE9FE] p-8">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-lavender to-lavender-dark shadow-sm flex items-center justify-center text-white font-bold">P</div>
        <span class="text-xl font-bold text-[#1E1B4B]">Poketto</span>
      </div>
      <h1 class="text-2xl font-bold text-[#1E1B4B] mb-1">Masuk ke Poketto</h1>
      <p class="text-gray-500 text-sm mb-6">Kelola keuanganmu dengan tenang.</p>

      <p id="login-message" class="hidden mb-4 text-sm rounded-lg px-3 py-2"></p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>

        <p id="login-error" class="hidden text-sm text-red-500"></p>

        <button type="submit" id="login-submit"
          class="w-full bg-lavender-dark hover:bg-[#7C3AED] shadow-sm shadow-lavender-dark/20 text-white font-semibold rounded-xl py-2.5 transition-colors">
          Masuk
        </button>
      </form>

      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400">atau</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <button type="button" id="google-btn"
        class="bg-white border border-gray-200 rounded-xl py-3 w-full flex items-center justify-center gap-3 shadow-sm hover:bg-gray-50 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        <span class="font-medium text-gray-700">Masuk dengan Google</span>
      </button>

      <p class="text-center text-sm text-gray-500 mt-6">
        Belum punya akun?
        <a href="register.html" class="text-lavender-dark font-medium hover:underline">Daftar di sini</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login } from '../assets/js/auth.js';
    // SETUP REQUIRED: Enable Google provider di Supabase Dashboard → Auth → Providers
    import { supabase } from '../assets/js/supabase-client.js';
    import { showToast } from '../assets/js/toast.js';

    document.getElementById('google-btn').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/pages/home.html'
        }
      });
      if (error) showToast(error.message, 'error');
    });

    // Tampilkan pesan dari query string (misal setelah register: "Cek email")
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message');
    if (message) {
      const messageEl = document.getElementById('login-message');
      messageEl.textContent = message;
      messageEl.className = 'mb-4 text-sm rounded-lg px-3 py-2 bg-mint-light text-emerald-700';
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await login(email, password);

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
