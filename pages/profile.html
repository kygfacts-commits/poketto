<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="../assets/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poketto">
  <link rel="stylesheet" href="../assets/css/tailwind.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Main content -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="px-4 py-5 md:px-10 md:py-8 max-w-2xl mx-auto">

      <!-- Avatar + Identity -->
      <div class="flex flex-col items-center pt-4 pb-6">
        <div id="avatar" class="w-20 h-20 rounded-full bg-lavender-light flex items-center justify-center text-3xl font-bold text-lavender-dark overflow-hidden mb-3">
          ?
        </div>
        <p id="profile-name-display" class="font-bold text-xl text-[#1E1B4B]"></p>
        <p id="profile-email" class="text-sm text-gray-400 mt-0.5"></p>
      </div>

      <!-- Form card -->
      <div class="bg-white rounded-2xl shadow-sm border border-[#EDE9FE] p-5">
        <form id="profile-form" class="space-y-4">
          <div>
            <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" id="full_name"
              class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="currency_preference" class="block text-sm font-medium text-gray-700 mb-1">Mata Uang</label>
              <select id="currency_preference"
                class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
                <option value="IDR">IDR - Rupiah</option>
                <option value="USD">USD - Dolar AS</option>
                <option value="SGD">SGD - Dolar Singapura</option>
              </select>
            </div>
            <div>
              <label for="language_preference" class="block text-sm font-medium text-gray-700 mb-1">Bahasa</label>
              <select id="language_preference"
                class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
                <option value="id">Indonesia</option>
                <option value="en" selected>English</option>
              </select>
            </div>
          </div>

          <p id="profile-status" class="hidden text-sm rounded-lg px-3 py-2"></p>

          <button type="submit" id="profile-submit"
            class="w-full bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-2xl py-3 transition-colors">
            Simpan
          </button>
        </form>

        <button type="button" id="logout-mobile-btn"
          class="w-full mt-3 flex items-center justify-center gap-2 text-red-400 font-medium rounded-2xl py-3 border border-red-200 hover:bg-red-50 transition-colors">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          <span>Logout</span>
        </button>
      </div>

      <!-- Tema Warna card -->
      <div class="bg-white rounded-2xl shadow-sm border border-[#EDE9FE] p-5 mt-4">
        <h2 class="font-bold text-base text-[#1E1B4B] mb-1">Tema Warna</h2>
        <p class="text-sm text-gray-400 mb-4">Pilih tema aplikasi</p>
        <div id="theme-grid" class="flex flex-wrap gap-4"></div>
      </div>

      <!-- Keamanan card -->
      <div class="bg-white rounded-2xl shadow-sm border border-[#EDE9FE] p-5 mt-4">
        <h2 class="font-bold text-base text-[#1E1B4B] mb-4">Keamanan</h2>
        <form id="password-form" class="space-y-4">
          <div>
            <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
            <input type="password" id="new-password" placeholder="Min. 8 karakter"
              class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
          </div>
          <div>
            <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password</label>
            <input type="password" id="confirm-password" placeholder="Ulangi password baru"
              class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
          </div>
          <p id="password-status" class="hidden text-sm rounded-lg px-3 py-2"></p>
          <button type="submit" id="password-submit"
            class="w-full bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-2xl py-3 transition-colors">
            Ubah Password
          </button>
        </form>
      </div>

      <!-- Limit Harian card -->
      <div class="bg-white rounded-2xl shadow-sm border border-[#EDE9FE] p-5 mt-4">
        <h2 class="font-bold text-base text-[#1E1B4B] mb-1">Limit Harian</h2>
        <p class="text-sm text-gray-400 mb-4">Dapatkan peringatan saat pengeluaran harian mendekati batas.</p>
        <label for="daily-limit-input" class="block text-sm font-medium text-gray-700 mb-1">Limit pengeluaran harian (Rp)</label>
        <input type="text" inputmode="numeric" id="daily-limit-input" placeholder="0"
          class="w-full rounded-xl border border-[#DDD6FE] px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#8B5CF6] focus:border-[#8B5CF6]">
        <p class="text-xs text-gray-400 mt-1">Isi 0 untuk menonaktifkan.</p>
        <p id="daily-limit-status" class="hidden text-sm rounded-lg px-3 py-2 mt-3"></p>
        <button type="button" id="daily-limit-submit"
          class="w-full mt-4 bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-2xl py-3 transition-colors">
          Simpan
        </button>
      </div>
    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { supabase } from '../assets/js/supabase-client.js';
    import { saveUserTheme } from '../assets/js/theme.js';
    import { attachThousandsInput, parseThousands, formatThousands } from '../assets/js/utils.js';

    document.getElementById('logout-mobile-btn')?.addEventListener('click', logout);

    // ---------- Tema Warna (Fitur 5) ----------
    const THEME_OPTIONS = [
      { name: 'lavender', label: 'Lavender', hex: '#8B5CF6' },
      { name: 'ocean', label: 'Ocean', hex: '#0EA5E9' },
      { name: 'rose', label: 'Rose', hex: '#F43F5E' },
      { name: 'forest', label: 'Forest', hex: '#10B981' },
      { name: 'amber', label: 'Amber', hex: '#F59E0B' },
    ];

    // Tema aktif user (di-load dari profiles.theme_preference saat auth-ready).
    let activeTheme = 'lavender';

    function renderThemeGrid() {
      const grid = document.getElementById('theme-grid');
      grid.innerHTML = THEME_OPTIONS.map((t) => `
        <button type="button" data-theme="${t.name}" title="${t.label}"
          class="theme-dot rounded-full transition-all ${t.name === activeTheme ? 'ring-2 ring-offset-2 ring-gray-700 scale-110' : 'hover:scale-105'}"
          style="width:36px;height:36px;background-color:${t.hex}"></button>
      `).join('');
      grid.querySelectorAll('.theme-dot').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (window.blockIfDemo?.('Mengubah tema')) return;
          if (!currentUser) return;
          const theme = btn.dataset.theme;
          activeTheme = theme;
          renderThemeGrid();
          try {
            await saveUserTheme(currentUser.id, theme); // simpan ke DB + apply live
          } catch (err) {
            console.warn('[profile] gagal menyimpan tema:', err.message);
          }
        });
      });
    }
    renderThemeGrid();

    const avatarEl = document.getElementById('avatar');
    const emailEl = document.getElementById('profile-email');
    const nameDisplayEl = document.getElementById('profile-name-display');
    const form = document.getElementById('profile-form');
    const fullNameInput = document.getElementById('full_name');
    const currencySelect = document.getElementById('currency_preference');
    const languageSelect = document.getElementById('language_preference');
    const statusEl = document.getElementById('profile-status');
    const submitBtn = document.getElementById('profile-submit');

    let currentUser = null;

    function renderAvatar(profile, user) {
      const avatarUrl = profile?.avatar_url;
      if (avatarUrl) {
        avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Avatar" class="w-full h-full object-cover">`;
      } else {
        const source = profile?.full_name || user.email || '?';
        avatarEl.textContent = source.trim().charAt(0).toUpperCase();
      }
      nameDisplayEl.textContent = profile?.full_name || '';
    }

    async function loadProfile(user) {
      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .maybeSingle();

      if (error) {
        console.log('[profile] Error fetch profile:', error.message);
        return;
      }

      fullNameInput.value = data?.full_name || '';
      currencySelect.value = data?.currency_preference || 'IDR';
      languageSelect.value = data?.language_preference || 'en';
      const limit = Number(data?.daily_limit || 0);
      dailyLimitInput.value = limit > 0 ? formatThousands(String(limit)) : '';
      // Highlight dot tema sesuai tema akun.
      activeTheme = data?.theme_preference || 'lavender';
      renderThemeGrid();
      renderAvatar(data, user);
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      emailEl.textContent = currentUser.email;
      await loadProfile(currentUser);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;
      if (window.blockIfDemo?.('Menyimpan profil')) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Menyimpan...';
      statusEl.classList.add('hidden');

      const { error } = await supabase.from('profiles').upsert({
        id: currentUser.id,
        full_name: fullNameInput.value,
        currency_preference: currencySelect.value,
        language_preference: languageSelect.value,
      });

      if (error) {
        statusEl.textContent = 'Gagal menyimpan: ' + error.message;
        statusEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600';
      } else {
        await loadProfile(currentUser);
        statusEl.textContent = 'Profil berhasil disimpan.';
        statusEl.className = 'text-sm rounded-lg px-3 py-2 bg-mint-light text-emerald-700';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Simpan';
    });
    const passwordForm = document.getElementById('password-form');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const passwordStatusEl = document.getElementById('password-status');
    const passwordSubmitBtn = document.getElementById('password-submit');

    passwordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (window.blockIfDemo?.('Mengganti password')) return;
      const newPwd = newPasswordInput.value;
      const confirmPwd = confirmPasswordInput.value;
      passwordStatusEl.classList.add('hidden');

      if (newPwd.length < 8) {
        passwordStatusEl.textContent = 'Password minimal 8 karakter.';
        passwordStatusEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600';
        passwordStatusEl.classList.remove('hidden');
        return;
      }
      if (newPwd !== confirmPwd) {
        passwordStatusEl.textContent = 'Password tidak cocok.';
        passwordStatusEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600';
        passwordStatusEl.classList.remove('hidden');
        return;
      }

      passwordSubmitBtn.disabled = true;
      passwordSubmitBtn.textContent = 'Menyimpan...';

      const { error } = await supabase.auth.updateUser({ password: newPwd });

      if (error) {
        passwordStatusEl.textContent = 'Gagal: ' + error.message;
        passwordStatusEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600';
      } else {
        passwordStatusEl.textContent = 'Password berhasil diubah.';
        passwordStatusEl.className = 'text-sm rounded-lg px-3 py-2 bg-mint-light text-emerald-700';
        newPasswordInput.value = '';
        confirmPasswordInput.value = '';
      }

      passwordStatusEl.classList.remove('hidden');
      passwordSubmitBtn.disabled = false;
      passwordSubmitBtn.textContent = 'Ubah Password';
    });

    // ---------- Limit Harian (Fitur 4) ----------
    const dailyLimitInput = document.getElementById('daily-limit-input');
    const dailyLimitStatus = document.getElementById('daily-limit-status');
    const dailyLimitSubmit = document.getElementById('daily-limit-submit');
    attachThousandsInput(dailyLimitInput);

    dailyLimitSubmit.addEventListener('click', async () => {
      if (!currentUser) return;
      if (window.blockIfDemo?.('Menyimpan limit harian')) return;
      const limit = parseThousands(dailyLimitInput.value) || 0;
      dailyLimitSubmit.disabled = true;
      dailyLimitSubmit.textContent = 'Menyimpan...';
      dailyLimitStatus.classList.add('hidden');

      const { error } = await supabase.from('profiles').upsert({ id: currentUser.id, daily_limit: limit });

      if (error) {
        dailyLimitStatus.textContent = 'Gagal menyimpan: ' + error.message;
        dailyLimitStatus.className = 'text-sm rounded-lg px-3 py-2 mt-3 bg-red-50 text-red-600';
      } else {
        dailyLimitStatus.textContent = limit > 0 ? 'Limit harian berhasil disimpan.' : 'Limit harian dinonaktifkan.';
        dailyLimitStatus.className = 'text-sm rounded-lg px-3 py-2 mt-3 bg-mint-light text-emerald-700';
      }
      dailyLimitStatus.classList.remove('hidden');
      dailyLimitSubmit.disabled = false;
      dailyLimitSubmit.textContent = 'Simpan';
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
