<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Profil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>body{visibility:hidden}body.nav-loader-ready{visibility:visible}</style>
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container"></div>

  <!-- Main content -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="p-6 md:p-10 max-w-2xl mx-auto">
      <h1 class="text-2xl font-bold text-[#1E1B4B] mb-6">Profil</h1>

      <div class="bg-white rounded-2xl shadow-sm border border-[#EDE9FE] p-6 md:p-8">
        <div class="flex items-center gap-4 mb-6">
          <div id="avatar" class="w-16 h-16 rounded-full bg-lavender-light flex items-center justify-center text-2xl font-bold text-lavender-dark overflow-hidden flex-shrink-0">
            ?
          </div>
          <div>
            <p id="profile-email" class="font-medium text-gray-800"></p>
            <p class="text-sm text-gray-400">Akun Poketto</p>
          </div>
        </div>

        <form id="profile-form" class="space-y-4">
          <div>
            <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
            <input type="text" id="full_name"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="currency_preference" class="block text-sm font-medium text-gray-700 mb-1">Mata Uang</label>
              <select id="currency_preference"
                class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
                <option value="IDR">IDR - Rupiah</option>
                <option value="USD">USD - Dolar AS</option>
                <option value="SGD">SGD - Dolar Singapura</option>
              </select>
            </div>
            <div>
              <label for="language_preference" class="block text-sm font-medium text-gray-700 mb-1">Bahasa</label>
              <select id="language_preference"
                class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
                <option value="id">Indonesia</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>

          <p id="profile-status" class="hidden text-sm rounded-lg px-3 py-2"></p>

          <div class="flex items-center gap-3">
            <button type="submit" id="profile-submit"
              class="bg-lavender hover:bg-lavender-dark text-white font-semibold rounded-xl px-6 py-2.5 transition-colors">
              Simpan
            </button>
            <button type="button" id="logout-mobile-btn"
              class="md:hidden flex items-center gap-2 text-red-500 hover:text-red-600 font-medium rounded-xl px-4 py-2.5 border border-red-200 hover:bg-red-50 transition-colors">
              <i data-lucide="log-out" class="w-4 h-4"></i>
              <span>Logout</span>
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>


  <div id="mobile-nav-container"></div>

  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { supabase } from '../assets/js/supabase-client.js';

    document.getElementById('logout-mobile-btn')?.addEventListener('click', logout);

    const avatarEl = document.getElementById('avatar');
    const emailEl = document.getElementById('profile-email');
    const form = document.getElementById('profile-form');
    const fullNameInput = document.getElementById('full_name');
    const currencySelect = document.getElementById('currency_preference');
    const languageSelect = document.getElementById('language_preference');
    const statusEl = document.getElementById('profile-status');
    const submitBtn = document.getElementById('profile-submit');

    let currentUser = null;

    function renderAvatar(profile, user) {
      const avatarUrl = profile?.avatar_url;
      if (avatarUrl) {
        avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Avatar" class="w-full h-full object-cover">`;
        return;
      }
      const source = profile?.full_name || user.email || '?';
      avatarEl.textContent = source.trim().charAt(0).toUpperCase();
    }

    async function loadProfile(user) {
      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .maybeSingle();

      if (error) {
        console.log('[profile] Error fetch profile:', error.message);
        return;
      }

      fullNameInput.value = data?.full_name || '';
      currencySelect.value = data?.currency_preference || 'IDR';
      languageSelect.value = data?.language_preference || 'id';
      renderAvatar(data, user);
    }

    window.addEventListener('schatz:auth-ready', async (e) => {
      currentUser = e.detail.user;
      emailEl.textContent = currentUser.email;
      await loadProfile(currentUser);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Menyimpan...';
      statusEl.classList.add('hidden');

      const { error } = await supabase.from('profiles').upsert({
        id: currentUser.id,
        full_name: fullNameInput.value,
        currency_preference: currencySelect.value,
        language_preference: languageSelect.value,
      });

      if (error) {
        statusEl.textContent = 'Gagal menyimpan: ' + error.message;
        statusEl.className = 'text-sm rounded-lg px-3 py-2 bg-red-50 text-red-600';
      } else {
        await loadProfile(currentUser);
        statusEl.textContent = 'Profil berhasil disimpan.';
        statusEl.className = 'text-sm rounded-lg px-3 py-2 bg-mint-light text-emerald-700';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Simpan';
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
