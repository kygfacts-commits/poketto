<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Daftar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-peach-light/40 via-lavender-light/60 to-mint-light/40 p-4 font-sans">
  <div class="w-full max-w-md">
    <a href="../index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-lavender-dark mb-6 transition-colors">
      &larr; Kembali ke Beranda
    </a>

    <div class="bg-white rounded-2xl shadow-md border border-[#EDE9FE] p-8">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-lavender to-lavender-dark shadow-sm flex items-center justify-center text-white font-bold">P</div>
        <span class="text-xl font-bold text-[#1E1B4B]">Poketto</span>
      </div>
      <h1 class="text-2xl font-bold text-[#1E1B4B] mb-1">Buat Akun Poketto</h1>
      <p class="text-gray-500 text-sm mb-6">Mulai catat pemasukan dan pengeluaranmu.</p>

      <form id="register-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
          <p class="text-xs text-gray-400 mt-1">Minimal 6 karakter.</p>
        </div>

        <p id="register-error" class="hidden text-sm text-red-500"></p>

        <button type="submit" id="register-submit"
          class="w-full bg-lavender-dark hover:bg-[#7C3AED] shadow-sm shadow-lavender-dark/20 text-white font-semibold rounded-xl py-2.5 transition-colors">
          Daftar
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Sudah punya akun?
        <a href="login.html" class="text-lavender-dark font-medium hover:underline">Masuk di sini</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { register } from '../assets/js/auth.js';

    const form = document.getElementById('register-form');
    const errorEl = document.getElementById('register-error');
    const submitBtn = document.getElementById('register-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await register(email, password);

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Daftar';
      }
    });
  </script>
</body>
</html>
