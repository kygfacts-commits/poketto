<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poketto - Transaksi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="../assets/js/theme.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poketto">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            lavender: { light: '#EDE9FE', DEFAULT: '#A78BFA', dark: '#8B5CF6', darker: '#7C3AED' },
            peach: { light: '#FED7AA', DEFAULT: '#FB923C' },
            sky: { light: '#BAE6FD', DEFAULT: '#38BDF8' },
            mint: { light: '#A7F3D0', DEFAULT: '#34D399' },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen bg-[#F8F7FF] font-sans">


  <div id="sidebar-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Main -->
  <div class="md:ml-64 min-h-screen pb-24 md:pb-0">
    <main class="px-4 py-5 md:px-10 md:py-8 max-w-5xl mx-auto">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-[#1E1B4B]">Transaksi</h1>
          <p class="text-sm text-gray-400 mt-0.5">Semua transaksi kamu</p>
        </div>
        <div class="flex items-center gap-2">
          <button id="export-csv-btn" class="flex items-center gap-2 bg-white border border-[#8B5CF6] text-[#8B5CF6] hover:bg-[#EDE9FE] font-semibold rounded-xl px-4 py-2.5 transition-colors text-sm">
            <i data-lucide="file-text" class="w-4 h-4"></i>
            <span class="hidden sm:inline">Export CSV</span>
            <span class="sm:hidden">CSV</span>
          </button>
          <button id="export-btn" class="flex items-center gap-2 bg-[#8B5CF6] hover:bg-lavender-dark text-white font-semibold rounded-xl px-4 py-2.5 transition-colors text-sm">
            <i data-lucide="download" class="w-4 h-4"></i>
            <span class="hidden sm:inline">Export Excel</span>
            <span class="sm:hidden">Excel</span>
          </button>
        </div>
      </div>

      <!-- Month nav -->
      <div class="flex items-center justify-between bg-white rounded-2xl border border-[#EDE9FE] shadow-sm px-5 py-3 mb-4">
        <button id="prev-month" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <p id="month-label" class="font-semibold text-gray-700 text-sm"></p>
        <button id="next-month" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-3 mb-4 items-center">
        <div id="type-tabs" class="flex gap-2 flex-nowrap overflow-x-auto scrollbar-hide pb-0.5">
          <button data-type="all" class="type-tab px-3 py-1.5 rounded-full text-sm font-semibold bg-[#8B5CF6] text-white transition-colors whitespace-nowrap">Semua</button>
          <button data-type="income" class="type-tab px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 bg-white border border-gray-200 transition-colors whitespace-nowrap">Pemasukan</button>
          <button data-type="expense" class="type-tab px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 bg-white border border-gray-200 transition-colors whitespace-nowrap">Pengeluaran</button>
          <button data-type="transfer" class="type-tab px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 bg-white border border-gray-200 transition-colors whitespace-nowrap">Transfer</button>
        </div>
        <select id="cat-filter" class="rounded-xl border border-gray-200 bg-white shadow-sm px-3 py-2 text-xs font-medium focus:outline-none focus:ring-2 focus:ring-lavender">
          <option value="">Semua Kategori</option>
        </select>
        <label class="flex items-center gap-2 text-xs font-medium text-gray-500 cursor-pointer select-none">
          <input type="checkbox" id="include-transfer-csv" class="rounded border-gray-300 text-[#8B5CF6] focus:ring-lavender">
          Sertakan transfer di export
        </label>
      </div>

      <!-- Search + tag filter -->
      <div class="flex flex-col sm:flex-row gap-3 mb-4">
        <div class="relative flex-1">
          <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
          <input type="text" id="tx-search" placeholder="Cari transaksi..."
            class="w-full rounded-xl border border-[#DDD6FE] bg-white shadow-sm pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div class="relative sm:w-56">
          <i data-lucide="tag" class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
          <input type="text" id="tx-tag-search" placeholder="Cari tag..."
            class="w-full rounded-xl border border-[#DDD6FE] bg-white shadow-sm pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
      </div>

      <!-- Summary cards -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-4">
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Pemasukan</p>
          <p id="sum-income" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-sky-600">–</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Pengeluaran</p>
          <p id="sum-expense" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-peach">–</p>
        </div>
        <div class="bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-4 col-span-2 sm:col-span-1">
          <p class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Selisih</p>
          <p id="sum-diff" class="text-xl md:text-2xl font-extrabold tracking-tight truncate text-[#1E1B4B]">–</p>
        </div>
      </div>

      <!-- Mobile card list -->
      <div id="tx-mobile-list" class="sm:hidden space-y-2 mb-2"></div>

      <!-- Desktop table -->
      <div class="hidden sm:block bg-white rounded-2xl border border-[#EDE9FE] shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-[#EDE9FE] bg-[#F3F0FF]">
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Tanggal</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide hidden sm:table-cell">Akun</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Kategori</th>
                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide hidden md:table-cell">Deskripsi</th>
                <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Tipe</th>
                <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Nominal</th>
                <th class="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody id="tx-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Empty state (shared) -->
      <div id="tx-empty" class="hidden bg-white rounded-2xl border border-[#EDE9FE] shadow-sm p-12 text-center">
        <i data-lucide="inbox" class="w-10 h-10 text-gray-200 mx-auto mb-3"></i>
        <p id="tx-empty-text" class="text-sm text-gray-400">Tidak ada transaksi untuk periode ini.</p>
      </div>

      <!-- Pagination (shared) -->
      <div id="pagination-wrap" class="hidden flex items-center justify-between bg-white rounded-2xl border border-[#EDE9FE] shadow-sm px-5 py-3 mt-2">
        <p id="pagination-info" class="text-xs text-gray-400"></p>
        <div class="flex gap-2">
          <button id="prev-page" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Sebelumnya</button>
          <button id="next-page" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Berikutnya</button>
        </div>
      </div>

    </main>
  </div>


  <div id="mobile-nav-container" class="opacity-0 transition-opacity duration-300"></div>

  <!-- Edit Transaction Modal -->
  <div id="edit-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold text-[#1E1B4B]">Edit Transaksi</h2>
        <button id="edit-modal-close" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-type">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
          <input type="date" id="edit-date" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nominal</label>
          <input type="text" inputmode="numeric" id="edit-amount" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <div id="edit-account-wrap">
          <label class="block text-sm font-medium text-gray-700 mb-1">Akun</label>
          <select id="edit-account" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender"></select>
        </div>
        <div id="edit-to-account-wrap" class="hidden">
          <label class="block text-sm font-medium text-gray-700 mb-1">Ke Akun</label>
          <select id="edit-to-account" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender"></select>
        </div>
        <div id="edit-category-wrap">
          <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
          <select id="edit-category" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
            <option value="">– Tanpa Kategori –</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
          <input type="text" id="edit-description" placeholder="Opsional" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-lavender focus:border-lavender">
        </div>
        <p id="edit-error" class="hidden text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></p>
        <div class="flex gap-3 pt-1">
          <button type="button" id="edit-cancel" class="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Batal</button>
          <button type="submit" id="edit-submit" class="flex-1 rounded-xl bg-lavender hover:bg-lavender-dark text-white py-2.5 text-sm font-semibold transition-colors">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="delete-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6 text-center">
      <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <i data-lucide="trash-2" class="w-7 h-7 text-red-500"></i>
      </div>
      <h2 class="text-lg font-bold text-[#1E1B4B] mb-1">Hapus Transaksi?</h2>
      <p class="text-sm text-gray-400 mb-5">Tindakan ini tidak bisa dibatalkan.</p>
      <div class="flex gap-3">
        <button id="delete-cancel" class="flex-1 rounded-xl border border-gray-200 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Batal</button>
        <button id="delete-confirm" class="flex-1 rounded-xl bg-red-500 hover:bg-red-600 text-white py-2.5 text-sm font-semibold transition-colors">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-[60] px-5 py-3 rounded-2xl shadow-lg text-sm font-medium text-white transition-all"></div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script type="module">
    import '../assets/js/auth-guard.js';
    import { logout } from '../assets/js/auth.js';
    import { formatCurrency, parseThousands, attachThousandsInput, groupTransferPairs } from '../assets/js/utils.js';
    import { fetchProfileCurrency, fetchAllTransactions } from '../assets/js/home.js';
    import { fetchAccounts } from '../assets/js/accounts.js';
    import { fetchCategories } from '../assets/js/categories.js';
    import { updateTransaction, deleteTransaction, deleteTransactionByPair } from '../assets/js/transactions.js';
    import { showToast } from '../assets/js/toast.js';

    const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni',
                         'Juli','Agustus','September','Oktober','November','Desember'];
    const DAY_NAMES = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const PAGE_SIZE = 20;

    let currentUser, currency = 'IDR';
    let accounts = [], accountsById = new Map();
    let allTransactions = [], filteredTxs = [];
    let incomeCategories = [], expenseCategories = [], allCategories = [];
    let categoriesById = new Map();
    let currentYear, currentMonth, filterType = 'all', filterCategoryId = '', searchQuery = '', filterTag = '';
    let currentPage = 1;
    let deletingId = null, editingTx = null;

    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth();

    attachThousandsInput(document.getElementById('edit-amount'));

    // --- Load ---
    async function loadData() {
      try {
        [accounts, allTransactions, incomeCategories, expenseCategories] = await Promise.all([
          fetchAccounts(currentUser.id),
          fetchAllTransactions(currentUser.id),
          fetchCategories('income', null, true),
          fetchCategories('expense', null, true),
        ]);
        accountsById = new Map(accounts.map(a => [a.id, a]));
        allCategories = [...incomeCategories, ...expenseCategories];
        categoriesById = new Map(allCategories.map(c => [c.id, c]));
        populateCategoryFilter();
        populateEditDropdowns();
        applyFilters();
      } catch (err) {
        console.error('[transactions]', err.message);
      }
    }

    function populateCategoryFilter() {
      const sel = document.getElementById('cat-filter');
      sel.innerHTML = `<option value="">Semua Kategori</option>` +
        `<optgroup label="Pemasukan">` +
        incomeCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('') +
        `</optgroup><optgroup label="Pengeluaran">` +
        expenseCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('') +
        `</optgroup>`;
    }

    function populateEditDropdowns() {
      const accountOpts = accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
      document.getElementById('edit-account').innerHTML = accountOpts;
      document.getElementById('edit-to-account').innerHTML = accountOpts;
    }

    // --- Filters ---
    function applyFilters() {
      document.getElementById('month-label').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;

      // Filter bulan dulu, lalu gabungkan pasangan transfer menjadi satu item.
      const monthRows = allTransactions.filter(tx => {
        const [y, m] = tx.date.split('-').map(Number);
        return y === currentYear && m === currentMonth + 1;
      });

      filteredTxs = groupTransferPairs(monthRows).filter(tx => {
        const isTransfer = !!tx.transfer_type || tx.type === 'transfer';
        if (filterType === 'transfer') {
          if (!isTransfer) return false;
        } else if (filterType === 'income' || filterType === 'expense') {
          if (tx.type !== filterType || isTransfer) return false;
        }
        if (filterCategoryId && tx.category_id !== filterCategoryId) return false;
        if (searchQuery) {
          const cat = categoriesById.get(tx.category_id);
          const tagsStr = Array.isArray(tx.tags) ? tx.tags.join(' ') : '';
          const haystack = `${cat?.name || ''} ${tx.description || ''} ${tagsStr}`.toLowerCase();
          if (!haystack.includes(searchQuery)) return false;
        }
        if (filterTag) {
          const tags = Array.isArray(tx.tags) ? tx.tags.map(t => String(t).toLowerCase()) : [];
          if (!tags.some(t => t.includes(filterTag))) return false;
        }
        return true;
      });

      currentPage = 1;
      renderSummary();
      renderTable();
    }

    function renderSummary() {
      // Exclude transfer dari ringkasan cashflow.
      const income = filteredTxs.filter(t => t.type === 'income' && !t.transfer_type).reduce((s, t) => s + Number(t.amount), 0);
      const expense = filteredTxs.filter(t => t.type === 'expense' && !t.transfer_type).reduce((s, t) => s + Number(t.amount), 0);
      const diff = income - expense;
      document.getElementById('sum-income').textContent = formatCurrency(income, currency);
      document.getElementById('sum-expense').textContent = formatCurrency(expense, currency);
      const diffEl = document.getElementById('sum-diff');
      diffEl.textContent = (diff >= 0 ? '+' : '') + formatCurrency(Math.abs(diff), currency);
      diffEl.className = `text-xl md:text-2xl font-extrabold tracking-tight truncate ${diff >= 0 ? 'text-mint' : 'text-peach'}`;
    }

    function renderTable() {
      const total = filteredTxs.length;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, total);
      const page = filteredTxs.slice(start, end);

      const tbody = document.getElementById('tx-tbody');
      const mobileList = document.getElementById('tx-mobile-list');
      const emptyEl = document.getElementById('tx-empty');
      const paginationWrap = document.getElementById('pagination-wrap');

      if (total === 0) {
        tbody.innerHTML = '';
        mobileList.innerHTML = '';
        document.getElementById('tx-empty-text').textContent =
          searchQuery ? 'Tidak ada transaksi ditemukan' : 'Tidak ada transaksi untuk periode ini.';
        emptyEl.classList.remove('hidden');
        paginationWrap.classList.add('hidden');
        lucide.createIcons();
        return;
      }

      emptyEl.classList.add('hidden');

      const rows = page.map(tx => {
        const acct = accountsById.get(tx.account_id);
        const cat = categoriesById.get(tx.category_id);
        const [y, m, d] = tx.date.split('-').map(Number);
        const dateStr = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;

        const isTransfer = !!tx.transfer_type || tx.type === 'transfer';
        let typeBadge, amountClass, prefix;
        if (isTransfer) {
          typeBadge = '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-lavender-light/50 text-lavender-dark">Transfer</span>';
          amountClass = 'text-lavender-dark'; prefix = '';
        } else if (tx.type === 'income') {
          typeBadge = '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-sky-light/50 text-sky-600">Pemasukan</span>';
          amountClass = 'text-sky-600'; prefix = '+';
        } else {
          typeBadge = '<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-peach-light/50 text-peach">Pengeluaran</span>';
          amountClass = 'text-peach'; prefix = '-';
        }

        // Nama akun: transfer = "asal → tujuan"; non-transfer = nama akun.
        let catName, acctLabel;
        if (isTransfer) {
          catName = 'Transfer';
          const fromName = accountsById.get(tx.fromAccountId || tx.account_id)?.name || '?';
          const toName = accountsById.get(tx.toAccountId)?.name || '?';
          acctLabel = `${fromName} → ${toName}`;
        } else {
          catName = cat?.name || '–';
          acctLabel = acct?.name || '–';
        }

        const tagsHtml = (!isTransfer && Array.isArray(tx.tags) && tx.tags.length)
          ? `<div class="flex flex-wrap gap-1 mt-1">${tx.tags.map(t => `<span class="bg-[#EDE9FE] text-[#8B5CF6] rounded-full px-2 py-0.5 text-[10px]">#${t}</span>`).join('')}</div>`
          : '';
        const acctCur = acct?.currency || currency;
        return { tx, acct, dateStr, typeBadge, amountClass, prefix, catName, acctLabel, tagsHtml, acctCur };
      });

      tbody.innerHTML = rows.map(({ tx, dateStr, typeBadge, amountClass, prefix, catName, acctLabel, tagsHtml, acctCur }) =>
        `<tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
          <td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">${dateStr}</td>
          <td class="px-4 py-3 text-sm text-gray-700 max-w-[140px] truncate hidden sm:table-cell">${acctLabel}</td>
          <td class="px-4 py-3 text-sm text-gray-600 max-w-[140px]"><span class="truncate block">${catName}</span>${tagsHtml}</td>
          <td class="px-4 py-3 text-xs text-gray-400 max-w-[150px] truncate hidden md:table-cell">${tx.description || '–'}</td>
          <td class="px-4 py-3 text-center">${typeBadge}</td>
          <td class="px-4 py-3 text-right font-semibold ${amountClass} whitespace-nowrap">${prefix}${formatCurrency(Number(tx.amount), acctCur)}</td>
          <td class="px-4 py-3">
            <div class="flex gap-1 justify-end">
              <button data-id="${tx.id}" class="edit-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <i data-lucide="edit-2" class="w-4 h-4"></i>
              </button>
              <button data-id="${tx.id}" class="delete-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </td>
        </tr>`
      ).join('');

      mobileList.innerHTML = rows.map(({ tx, dateStr, typeBadge, amountClass, prefix, catName, acctLabel, tagsHtml, acctCur }) =>
        `<div class="rounded-xl p-3 bg-white border border-[#EDE9FE] shadow-sm">
          <div class="flex items-start justify-between mb-1">
            <p class="font-medium text-gray-800 text-sm truncate flex-1 mr-2">${catName}</p>
            ${typeBadge}
          </div>
          <p class="text-xs text-gray-400 mb-2 truncate">${acctLabel}</p>
          ${tagsHtml}
          <div class="flex items-center justify-between mt-1">
            <p class="text-xs text-gray-400">${dateStr}</p>
            <p class="font-semibold text-sm ${amountClass} whitespace-nowrap">${prefix}${formatCurrency(Number(tx.amount), acctCur)}</p>
          </div>
          <div class="flex justify-end gap-1 mt-2 pt-1.5 border-t border-gray-50">
            <button data-id="${tx.id}" class="edit-btn p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
              <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
            </button>
            <button data-id="${tx.id}" class="delete-btn p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
              <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
            </button>
          </div>
        </div>`
      ).join('');

      // Pagination
      if (total > PAGE_SIZE) {
        paginationWrap.classList.remove('hidden');
        document.getElementById('pagination-info').textContent =
          `Menampilkan ${start + 1}–${end} dari ${total} transaksi`;
        document.getElementById('prev-page').disabled = currentPage <= 1;
        document.getElementById('next-page').disabled = currentPage >= totalPages;
      } else {
        paginationWrap.classList.add('hidden');
      }

      lucide.createIcons();
    }

    // --- Event delegation on tbody ---
    document.getElementById('tx-tbody').addEventListener('click', e => {
      const editBtn = e.target.closest('.edit-btn');
      const deleteBtn = e.target.closest('.delete-btn');
      if (editBtn) openEditModal(editBtn.dataset.id);
      else if (deleteBtn) openDeleteModal(deleteBtn.dataset.id);
    });

    // --- Event delegation on mobile list ---
    document.getElementById('tx-mobile-list').addEventListener('click', e => {
      const editBtn = e.target.closest('.edit-btn');
      const deleteBtn = e.target.closest('.delete-btn');
      if (editBtn) openEditModal(editBtn.dataset.id);
      else if (deleteBtn) openDeleteModal(deleteBtn.dataset.id);
    });

    // --- Month navigation ---
    document.getElementById('prev-month').addEventListener('click', () => {
      if (currentMonth === 0) { currentYear--; currentMonth = 11; }
      else currentMonth--;
      applyFilters();
    });
    document.getElementById('next-month').addEventListener('click', () => {
      if (currentMonth === 11) { currentYear++; currentMonth = 0; }
      else currentMonth++;
      applyFilters();
    });

    // --- Type filter tabs ---
    document.getElementById('type-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.type-tab');
      if (!btn) return;
      filterType = btn.dataset.type;
      document.querySelectorAll('.type-tab').forEach(b => {
        b.className = b === btn
          ? 'type-tab px-3 py-1.5 rounded-full text-sm font-semibold bg-[#8B5CF6] text-white transition-colors whitespace-nowrap'
          : 'type-tab px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 bg-white border border-gray-200 transition-colors whitespace-nowrap';
      });
      applyFilters();
    });

    // --- Category filter ---
    document.getElementById('cat-filter').addEventListener('change', e => {
      filterCategoryId = e.target.value;
      applyFilters();
    });

    // --- Search (filter tampilan saja, tanpa fetch ulang) ---
    document.getElementById('tx-search').addEventListener('input', e => {
      searchQuery = e.target.value.trim().toLowerCase();
      applyFilters();
    });

    // --- Filter tag ---
    document.getElementById('tx-tag-search').addEventListener('input', e => {
      filterTag = e.target.value.trim().toLowerCase().replace(/^#/, '');
      applyFilters();
    });

    // --- Pagination ---
    document.getElementById('prev-page').addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; renderTable(); }
    });
    document.getElementById('next-page').addEventListener('click', () => {
      const totalPages = Math.ceil(filteredTxs.length / PAGE_SIZE);
      if (currentPage < totalPages) { currentPage++; renderTable(); }
    });

    // --- Edit Modal ---
    function openEditModal(txId) {
      editingTx = allTransactions.find(t => t.id === txId);
      if (!editingTx) return;
      const tx = editingTx;
      // Transfer (double-entry) tidak boleh diedit individual.
      if (tx.transfer_type || tx.type === 'transfer') {
        showToast('Edit transfer tidak diizinkan. Hapus dan buat ulang.', 'error');
        editingTx = null;
        return;
      }
      document.getElementById('edit-id').value = tx.id;
      document.getElementById('edit-type').value = tx.type;
      document.getElementById('edit-date').value = tx.date;

      const amountEl = document.getElementById('edit-amount');
      amountEl.value = Number(tx.amount).toLocaleString('id-ID');
      amountEl.dispatchEvent(new Event('input'));

      document.getElementById('edit-account').value = tx.account_id;
      document.getElementById('edit-description').value = tx.description || '';

      const catWrap = document.getElementById('edit-category-wrap');
      const toWrap = document.getElementById('edit-to-account-wrap');

      if (tx.type === 'transfer') {
        catWrap.classList.add('hidden');
        toWrap.classList.remove('hidden');
        document.getElementById('edit-to-account').value = tx.to_account_id || '';
      } else {
        toWrap.classList.add('hidden');
        catWrap.classList.remove('hidden');
        const cats = tx.type === 'income' ? incomeCategories : expenseCategories;
        document.getElementById('edit-category').innerHTML =
          `<option value="">– Tanpa Kategori –</option>` +
          cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('edit-category').value = tx.category_id || '';
      }

      document.getElementById('edit-error').classList.add('hidden');
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.add('hidden');
      editingTx = null;
    }

    document.getElementById('edit-modal-close').addEventListener('click', closeEditModal);
    document.getElementById('edit-cancel').addEventListener('click', closeEditModal);

    document.getElementById('edit-form').addEventListener('submit', async e => {
      e.preventDefault();
      if (window.blockIfDemo?.('Menyimpan transaksi')) return;
      const errEl = document.getElementById('edit-error');
      errEl.classList.add('hidden');
      const id = document.getElementById('edit-id').value;
      const type = document.getElementById('edit-type').value;
      const date = document.getElementById('edit-date').value;
      const amount = parseThousands(document.getElementById('edit-amount').value);
      const account_id = document.getElementById('edit-account').value;
      const description = document.getElementById('edit-description').value.trim();

      if (!date || isNaN(amount) || amount <= 0 || !account_id) {
        errEl.textContent = 'Mohon isi semua field wajib.';
        errEl.classList.remove('hidden');
        return;
      }

      const payload = { date, amount, account_id, description: description || null };
      if (type === 'transfer') {
        payload.to_account_id = document.getElementById('edit-to-account').value;
      } else {
        payload.category_id = document.getElementById('edit-category').value || null;
      }

      const submitBtn = document.getElementById('edit-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Menyimpan…';

      try {
        await updateTransaction(id, payload);
        showToast('Transaksi berhasil diupdate');
        closeEditModal();
        allTransactions = await fetchAllTransactions(currentUser.id);
        applyFilters();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Simpan';
      }
    });

    // --- Delete Modal ---
    function openDeleteModal(txId) {
      deletingId = txId;
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    document.getElementById('delete-cancel').addEventListener('click', () => {
      document.getElementById('delete-modal').classList.add('hidden');
      deletingId = null;
    });
    document.getElementById('delete-confirm').addEventListener('click', async () => {
      if (!deletingId) return;
      if (window.blockIfDemo?.('Menghapus transaksi')) return;
      try {
        const tx = allTransactions.find(t => t.id === deletingId);
        if (tx?.transfer_pair_id) {
          await deleteTransactionByPair(tx.transfer_pair_id); // hapus kedua sisi transfer
        } else {
          await deleteTransaction(deletingId);
        }
        showToast('Transaksi dihapus');
        document.getElementById('delete-modal').classList.add('hidden');
        allTransactions = await fetchAllTransactions(currentUser.id);
        applyFilters();
      } catch (err) {
        showToast(err.message, 'error');
      }
      deletingId = null;
    });

    // --- Export Excel ---
    document.getElementById('export-btn').addEventListener('click', () => {
      const XLSX = window.XLSX;
      if (!XLSX) { showToast('Library Excel belum siap, coba lagi.', 'error'); return; }
      if (filteredTxs.length === 0) { showToast('Tidak ada data untuk diexport.', 'error'); return; }

      const headers = ['Tanggal','Hari','Akun','Kategori','Deskripsi','Tipe','Nominal','Mata Uang'];
      const rows = filteredTxs.map(tx => {
        const [y, m, d] = tx.date.split('-').map(Number);
        const dateStr = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
        const dayName = DAY_NAMES[new Date(y, m - 1, d).getDay()];
        const acct = accountsById.get(tx.account_id);
        const cat = categoriesById.get(tx.category_id);
        const isTransfer = !!tx.transfer_type || tx.type === 'transfer';
        const typeLabel = isTransfer ? 'Transfer' : (tx.type === 'income' ? 'Pemasukan' : 'Pengeluaran');
        let acctName = acct?.name || '–';
        let catName = cat?.name || '–';
        if (isTransfer) {
          catName = 'Transfer';
          const fromN = accountsById.get(tx.fromAccountId || tx.account_id)?.name || '?';
          const toN = accountsById.get(tx.toAccountId)?.name || '?';
          acctName = `${fromN} → ${toN}`;
        }
        return [
          dateStr, dayName, acctName, catName,
          tx.description || '', typeLabel, Number(tx.amount), acct?.currency || currency,
        ];
      });

      const data = [headers, ...rows];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{wch:12},{wch:10},{wch:15},{wch:18},{wch:25},{wch:12},{wch:15},{wch:8}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Transaksi');
      XLSX.writeFile(wb, `Poketto_Transaksi_${MONTH_NAMES[currentMonth]}_${currentYear}.xlsx`);
      showToast('File Excel berhasil didownload');
    });

    // --- Export CSV (Tugas 5A) ---
    function csvEscape(value) {
      const s = String(value ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    document.getElementById('export-csv-btn').addEventListener('click', () => {
      const includeTransfer = document.getElementById('include-transfer-csv').checked;
      let rows = filteredTxs.slice();
      if (!includeTransfer) {
        rows = rows.filter(tx => !tx.transfer_type && tx.type !== 'transfer');
      }
      if (rows.length === 0) { showToast('Tidak ada data untuk diexport.', 'error'); return; }

      const headers = ['Tanggal','Tipe','Kategori','Sub-kategori','Akun','Jumlah','Deskripsi','Transfer Pair ID'];
      const lines = rows.map(tx => {
        const acct = accountsById.get(tx.account_id);
        const cat = categoriesById.get(tx.category_id);
        const isTransfer = !!tx.transfer_type || tx.type === 'transfer';
        const typeLabel = isTransfer ? 'Transfer' : (tx.type === 'income' ? 'Pemasukan' : 'Pengeluaran');
        let acctName = acct?.name || '';
        let catName = cat?.name || '';
        if (isTransfer) {
          catName = 'Transfer';
          const fromN = accountsById.get(tx.fromAccountId || tx.account_id)?.name || '?';
          const toN = accountsById.get(tx.toAccountId)?.name || '?';
          acctName = `${fromN} → ${toN}`;
        }
        return [
          tx.date, typeLabel, catName, '', acctName,
          Number(tx.amount), tx.description || '', tx.transfer_pair_id || '',
        ].map(csvEscape).join(',');
      });

      // BOM (﻿) agar Excel membaca UTF-8 dengan benar.
      const csv = '﻿' + [headers.join(','), ...lines].join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `poketto-transaksi-${MONTH_NAMES[currentMonth].toLowerCase()}-${currentYear}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('File CSV berhasil didownload');
    });

    // --- Close modals on backdrop ---
    ['edit-modal','delete-modal'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
      });
    });

    // --- Auth ready ---
    window.addEventListener('schatz:auth-ready', async e => {
      currentUser = e.detail.user;
      try { currency = await fetchProfileCurrency(currentUser.id); } catch {}
      await loadData();
    });
  </script>
  <script type="module" src="../assets/js/nav-loader.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
